/* ---------- FINANCE DATA IMPORT (Excel) ---------- */
const FIN_SCHEMA=[
 {sheet:'Bank Transactions',key:'bankTx',cols:[['Date','date'],['Account No','account'],['Type (Receipt/Payment)','type'],['Reference','ref'],['Counterparty','counterparty'],['Currency','currency'],['Amount','amount'],['Category','category'],['Note','note']]},
 {sheet:'Payables',key:'payables',cols:[['Due Date','dueDate'],['Category','category'],['Supplier','supplier'],['Reference (BL)','ref'],['Currency','currency'],['Amount','amount'],['Status (Open/Paid)','status'],['Paid Date','paidDate'],['Note','note']]},
 {sheet:'VAT Entries',key:'vatEntries',cols:[['Period (YYYY-MM-01)','period'],['Invoice No','invoice'],['Customer','customer'],['Taxable Amount','taxableAmount'],['VAT Treatment','vatTreatment'],['VAT Amount','vatAmount'],['Note','note']]},
 {sheet:'Facilities',key:'facilities',cols:[['Bank / Financier','bank'],['Facility Type','type'],['Currency','currency'],['Limit','limit'],['Note','note']]},
 {sheet:'FX Marks',key:'fxMarks',cols:[['Date','date'],['LME Spot','lmeSpot'],['FX Rate','fxRate'],['Note','note']]}
];
const FIN_NUM=new Set(['amount','limit','lmeSpot','fxRate','taxableAmount','vatAmount']);
const FIN_DATE=new Set(['date','dueDate','paidDate']);
async function downloadFinanceTemplate(){
  try{await ensureXLSX();}catch(e){toast('Could not load the export engine (needs an internet connection)','amber');return;}
  const wb=XLSX.utils.book_new();
  // helpful reference sheet
  const refAoa=[['KRG Finance data template'],[],['Fill only the sheets you need. Each sheet maps to one finance dataset.'],
    ['On import, a sheet you include REPLACES that dataset; a sheet you leave out is untouched.'],
    ['This never affects shipments, contracts, credit or receivables data.'],[],
    ['Dates: use YYYY-MM-DD. Amounts: numbers only (no currency symbols).']];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(refAoa),'READ ME');
  FIN_SCHEMA.forEach(s=>{
    const ex=Store.d.finance[s.key]||[];
    const header=s.cols.map(c=>c[0]);
    const body=ex.map(r=>s.cols.map(c=>{let val=r[c[1]];return val==null?'':val;}));
    const ws=XLSX.utils.aoa_to_sheet([header,...body]);
    ws['!cols']=s.cols.map(c=>({wch:Math.max(c[0].length+2,14)}));
    XLSX.utils.book_append_sheet(wb,ws,s.sheet);
  });
  XLSX.writeFile(wb,'KRG-finance-template-'+iso(new Date())+'.xlsx');
  audit('finance template downloaded');toast('Template downloaded','green');
}
async function importFinanceExcel(file){
  try{await ensureXLSX();}catch(e){toast('Could not load the import engine (needs an internet connection)','amber');return;}
  const buf=await file.arrayBuffer();
  let wb;try{wb=XLSX.read(buf,{type:'array',cellDates:true});}catch(e){toast('Could not read that file — is it a valid .xlsx?','amber');return;}
  const staged={};const summary=[];
  FIN_SCHEMA.forEach(s=>{
    const ws=wb.Sheets[s.sheet];if(!ws)return;
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',blankrows:false});
    if(!aoa.length)return;
    const head=aoa[0].map(h=>String(h||'').trim().toLowerCase());
    const idx={};s.cols.forEach(c=>{const i=head.indexOf(c[0].toLowerCase());if(i>=0)idx[c[1]]=i;});
    const rows=[];
    for(let r=1;r<aoa.length;r++){
      const line=aoa[r];if(!line||!line.some(x=>String(x??'').trim()!==''))continue;
      const obj={id:uid('fin')};
      s.cols.forEach(c=>{const i=idx[c[1]];let val=i==null?null:line[i];
        if(val===''||val==null){obj[c[1]]=null;return;}
        if(FIN_DATE.has(c[1])){val=(val instanceof Date)?iso(new Date(val.getFullYear(),val.getMonth(),val.getDate())):String(val).trim();}
        else if(FIN_NUM.has(c[1])){const n=num(String(val).replace(/[,\s]/g,''));val=n==null?null:n;}
        else val=String(val).trim();
        obj[c[1]]=val;});
      rows.push(obj);
    }
    staged[s.key]=rows;summary.push([s.sheet,rows.length]);
  });
  if(!summary.length){toast('No recognised finance sheets found in that file','amber');return;}
  // Validate references against live pipeline data
  const blSet=new Set(Store.d.shipments.map(s=>blKey(s['BL NUMBER'])));
  const acctSet=new Set((Store.d.bankAccounts||[]).map(b=>String(b.accountNo)));
  const finSet=new Set(Store.d.shipments.map(s=>String(s['FINANCIER']||'').toUpperCase()).filter(Boolean));
  const custResolvable=n=>{const dir=customerDirectory();if(dir[custKey(n)])return true;const t=String(n||'').toUpperCase().replace(/[^A-Z0-9]/g,'');return Store.d.credit.some(r=>{const f=String(r['Full Company Name']||'').toUpperCase().replace(/[^A-Z0-9]/g,''),sh=String(r['Short Name']||'').toUpperCase().replace(/[^A-Z0-9]/g,'');return f===t||sh===t;});};
  const invSet=new Set(Store.d.ar.map(a=>String(a['INV No.']||'').trim()).filter(Boolean));
  const warn=[];
  (staged.bankTx||[]).forEach(r=>{if(r.account&&!acctSet.has(String(r.account)))warn.push(['Bank Transactions','account '+r.account+' is not a set-up bank account']);});
  (staged.payables||[]).forEach(r=>{if(r.ref&&!blSet.has(blKey(r.ref)))warn.push(['Payables','reference '+r.ref+' does not match any BL']);});
  (staged.vatEntries||[]).forEach(r=>{if(r.customer&&!custResolvable(r.customer))warn.push(['VAT Entries','customer "'+r.customer+'" not found in credit records']);if(r.invoice&&!invSet.has(String(r.invoice).trim()))warn.push(['VAT Entries','invoice '+r.invoice+' has no matching receivable']);});
  (staged.facilities||[]).forEach(r=>{if(r.bank&&!finSet.has(String(r.bank).toUpperCase())&&!acctSet.has(String(r.bank)))warn.push(['Facilities','"'+r.bank+'" is not a financier used on any BL']);});
  const totalRows=summary.reduce((a,s)=>a+s[1],0);
  const checked=totalRows-warn.length;
  const list=summary.map(([sh,n])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-2)"><span>${esc(sh)}</span><span class="mono t-strong">${n} row${n===1?'':'s'}</span></div>`).join('');
  const warnHtml=warn.length?`<div class="callout amber" style="margin:12px 0"><div style="width:100%"><b>${warn.length} reference${warn.length>1?'s':''} not matched against pipeline data:</b><div style="max-height:150px;overflow:auto;margin-top:6px">${warn.slice(0,40).map(w=>`<div class="t-sub" style="padding:2px 0">${esc(w[0])} — ${esc(w[1])}</div>`).join('')}${warn.length>40?`<div class="t-sub">…and ${warn.length-40} more</div>`:''}</div><div class="t-sub" style="margin-top:6px">These rows still import, but won\u2019t join to a BL, customer or account until the reference matches.</div></div></div>`:`<div class="callout grey" style="margin:12px 0">${svg('check',16)}<div>All references check out against current shipments, customers and accounts.</div></div>`;
  openModal(`<div class="modal-h">${svg('upload',19)}<h3>Confirm finance import</h3><div class="hint">${checked} of ${totalRows} rows validated against live pipeline data</div><button class="x" onclick="closeModal()">${svg('close',18)}</button></div>
    <div class="modal-b">
      <div class="callout grey" style="margin-bottom:4px">${svg('alert',16)}<div>Each sheet below <b>replaces</b> its finance dataset only. Sheets not in the file are left unchanged. Shipments, contracts, credit and receivables are never modified by this import.</div></div>
      ${warnHtml}
      ${list}
    </div>
    <div class="modal-f"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="finImpGo">Import${warn.length?' anyway':''}</button></div>`);
  $('#finImpGo').onclick=()=>{
    Store.d.finance=Store.d.finance||{};
    Object.keys(staged).forEach(k=>{Store.d.finance[k]=staged[k];});
    Store.save();audit('finance data imported',summary.map(s=>s[0]+':'+s[1]).join(', '));
    toast('Finance data imported','green');closeModal();route();
  };
}

   num:new Set(['NO. OF CONTAINERS','NET WEIGHT','GROSS WEIGHT','PRICE MT','CUSTOM DUTIES COST','STWG COST','INVOICE VALUE']),
   date:new Set(['SOB DATE','ETA','CD DUE DATE','STWG DUE DATE','INVOICE DUE DATE','QUOTA MONTH','DELIVERY MONTH'])},
 {sheet:'Sales Contracts', key:'contracts', prefix:'ct', label:'Sales Contracts',
   cols:[['S Number','S Number'],['Customer','Customer'],['Product','Product'],['Spec','Spec'],['Service Port','Service Port'],['Quota','Quota'],['QP','QP'],['CCY','CCY'],['Tonnage','Tonnage'],['BL Qty','BL Qty'],['Lots','Lots'],['Premium','Premium'],['Payment Terms','Payment Terms'],['P number','P number'],['Stock','Stock'],['BL Allocation','BL Allocation'],['LME','LME'],['FX','FX']],
   num:new Set(['Tonnage','BL Qty','Lots','Premium','LME','FX']),
   date:new Set(['Quota'])},
 {sheet:'Credit', key:'credit', prefix:'cr', label:'Credit lines',
   cols:[['Short Name','Short Name'],['Full Company Name','Full Company Name'],['Best Served From','Best Served From'],['VAT Code','VAT CODE'],['Address','Column1'],['City / Region','Column2'],['Country','Column3'],['MT / Month','MT / MONTH'],['Payment','Payment'],['Quota Overlap','Quota Overlap'],['Original Limit','Original Limit'],['Limit Requested','Limit Requested'],['KRG Limit Status','KRG Limit Status']],
   num:new Set(['MT / MONTH','Quota Overlap','Original Limit','Limit Requested','KRG Limit Status']),
   date:new Set()},
 {sheet:'Receivables', key:'ar', prefix:'ar', label:'Receivables',
   cols:[['Customer','CUSTOMER'],['Premium','PREMIUM'],['Delivery Q','DELIVERY Q'],['Net Tonnage','NET TONNAGE'],['Price','PRICE'],['Total Amount','TOTAL AMOUNT'],['Payment Term','PAYMENT TERM'],['Delivery Date','DELIVERY DATE'],['Invoice No','INV No.'],['Due Date','DUE DATE'],['Status','Status'],['Paid Date','PAID DATE']],
   num:new Set(['PREMIUM','NET TONNAGE','PRICE','TOTAL AMOUNT']),
   date:new Set(['DELIVERY Q','DELIVERY DATE','DUE DATE','PAID DATE'])}
];
const RID='Row ID (do not edit)';
function corePermFor(key){return {shipments:'edit_shipment',contracts:'edit_contract',credit:'edit_credit',ar:'edit_ar'}[key];}
function coreCellOut(field,val){ if(val==null)return ''; return val; }
async function downloadCoreTemplate(){
  if(!requirePerm('import','download the data template'))return;
  try{await ensureXLSX();}catch(e){toast('Could not load the export engine (needs an internet connection)','amber');return;}
  const wb=XLSX.utils.book_new();
  const readme=[['KRG Pipeline — core data template'],[],
    ['This file contains your CURRENT pipeline data, one sheet per dataset.'],
    ['Edit values in place to update a row. Matching is by the "'+RID+'" column.'],
    ['• Keep the Row ID to UPDATE that existing row.'],
    ['• Add a new row and LEAVE Row ID BLANK to create a new record.'],
    ['• Rows are never deleted by import. Remove nothing — clearing a row does nothing.'],[],
    ['Preserved automatically (not shown here, never overwritten):'],
    ['  · BL container / PB details and PB allocations'],
    ['  · contract pricing tranches, provisional & final invoice fields'],[],
    ['Dates: YYYY-MM-DD. Amounts: numbers only (no currency symbols or commas).']];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(readme),'READ ME');
  CORE_SCHEMA.forEach(s=>{
    const header=[RID,...s.cols.map(c=>c[0])];
    const body=(Store.d[s.key]||[]).map(r=>[r.id,...s.cols.map(c=>coreCellOut(c[1],r[c[1]]))]);
    const ws=XLSX.utils.aoa_to_sheet([header,...body]);
    ws['!cols']=header.map(hh=>({wch:Math.max(String(hh).length+2,14)}));
    XLSX.utils.book_append_sheet(wb,ws,s.sheet);
  });
  XLSX.writeFile(wb,'KRG-pipeline-data-'+iso(new Date())+'.xlsx');
  audit('core data template downloaded');toast('Data template downloaded with current records','green');
}
async function importCoreExcel(file){
  if(!requirePerm('import','import pipeline data'))return;
  try{await ensureXLSX();}catch(e){toast('Could not load the import engine (needs an internet connection)','amber');return;}
  const buf=await file.arrayBuffer();
  let wb;try{wb=XLSX.read(buf,{type:'array',cellDates:true});}catch(e){toast('Could not read that file — is it a valid .xlsx?','amber');return;}
  const plan=[];const problems=[];
  CORE_SCHEMA.forEach(s=>{
    const ws=wb.Sheets[s.sheet];if(!ws)return;
    if(!Auth.can(corePermFor(s.key))){problems.push([s.label,'skipped — you don\u2019t have permission to edit this dataset']);return;}
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',blankrows:false});
    if(aoa.length<2){plan.push({s,updates:[],adds:[],missing:[]});return;}
    const head=aoa[0].map(h=>String(h||'').trim().toLowerCase());
    const ridIdx=head.indexOf(RID.toLowerCase());
    const idx={};s.cols.forEach(c=>{const i=head.indexOf(c[0].toLowerCase());if(i>=0)idx[c[1]]=i;});
    const byId={};(Store.d[s.key]||[]).forEach(r=>byId[r.id]=r);
    const updates=[],adds=[],missing=[];
    for(let r=1;r<aoa.length;r++){
      const line=aoa[r];if(!line||!line.some(x=>String(x??'').trim()!==''))continue;
      const vals={};
      s.cols.forEach(c=>{const i=idx[c[1]];if(i==null)return;let val=line[i];
        if(val===''||val==null){vals[c[1]]=null;return;}
        if(s.date.has(c[1])){val=(val instanceof Date)?iso(new Date(val.getFullYear(),val.getMonth(),val.getDate())):String(val).trim();}
        else if(s.num.has(c[1])){const n=num(String(val).replace(/[,\s]/g,''));val=n==null?null:n;}
        else val=String(val).trim();
        vals[c[1]]=val;});
      const rid=ridIdx>=0?String(line[ridIdx]||'').trim():'';
      if(rid){ if(byId[rid])updates.push({rid,vals}); else missing.push(rid); }
      else adds.push({vals});
    }
    plan.push({s,updates,adds,missing});
  });
  if(!plan.length){toast('No recognised data sheets found in that file','amber');return;}
  const rowsHtml=plan.map(p=>`<div style="padding:8px 0;border-bottom:1px solid var(--border-2)">
    <div style="display:flex;justify-content:space-between"><span class="t-strong">${esc(p.s.label)}</span>
      <span class="mono">${p.updates.length} updated · ${p.adds.length} new${p.missing.length?` · <span style="color:var(--amber)">${p.missing.length} unknown ID</span>`:''}</span></div>
    ${p.missing.length?`<div class="t-sub" style="margin-top:3px">Unknown Row IDs are ignored: ${esc(p.missing.slice(0,6).join(', '))}${p.missing.length>6?'…':''}</div>`:''}</div>`).join('');
  const probHtml=problems.length?`<div class="callout amber" style="margin:12px 0">${svg('alert',16)}<div>${problems.map(p=>esc(p[0]+': '+p[1])).join('<br>')}</div></div>`:'';
  const totU=plan.reduce((a,p)=>a+p.updates.length,0),totA=plan.reduce((a,p)=>a+p.adds.length,0);
  openModal(`<div class="modal-h">${svg('upload',19)}<h3>Confirm data refresh</h3><div class="hint">${totU} rows updated in place · ${totA} new rows added</div><button class="x" onclick="closeModal()">${svg('close',18)}</button></div>
    <div class="modal-b">
      <div class="callout grey" style="margin-bottom:8px">${svg('alert',16)}<div>Existing rows are matched by Row ID and only the columns in the file are changed. PB allocations, container details, pricing tranches and invoice fields are preserved. Nothing is deleted. Take a backup first if unsure.</div></div>
      ${probHtml}${rowsHtml}
    </div>
    <div class="modal-f"><button class="btn btn-ghost" id="coreBk" style="margin-right:auto">${svg('download',14)}<span>Backup first</span></button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="coreGo">Apply refresh</button></div>`);
  $('#coreBk').onclick=()=>{const blob=new Blob([JSON.stringify({data:Store.d,docs:Store.docs},null,1)],{type:'application/json'});const a=el('a',{href:URL.createObjectURL(blob),download:'krg-pre-import-backup-'+iso(new Date())+'.json'});a.click();toast('Backup downloaded','green');};
  $('#coreGo').onclick=()=>{
    let u=0,ad=0;
    plan.forEach(p=>{
      const byId={};(Store.d[p.s.key]||[]).forEach(r=>byId[r.id]=r);
      p.updates.forEach(up=>{const row=byId[up.rid];if(!row)return;Object.keys(up.vals).forEach(f=>{row[f]=up.vals[f];});u++;});
      p.adds.forEach(nw=>{const rec={id:uid(p.s.prefix)};p.s.cols.forEach(c=>{rec[c[1]]=(c[1] in nw.vals)?nw.vals[c[1]]:null;});if(p.s.key==='ar'&&!rec.Status)rec.Status='Open';if(p.s.key==='contracts'&&!Array.isArray(rec.pricings))rec.pricings=[];Store.d[p.s.key].push(rec);ad++;});
    });
    Store.save();audit('core data refreshed',totU+' updated, '+totA+' added');
    toast('Data refreshed — '+u+' updated, '+ad+' added','green');closeModal();route();
  };
}


/* ---------- J. BOOT ---------- */
function showApp(){
  $('#login').classList.add('hide');
  $('#app').style.display='block';
  renderNav();
  if(!location.hash)location.hash='#/dashboard';
  route();
  if(Auth.user.mustChange)setTimeout(forcePasswordChange,250);
}
function showLogin(){
  $('#app').style.display='none';
  $('#login').classList.remove('hide');
  const hint=$('#loginHint');
  const fresh=Store.users.length===1&&Store.users[0].username==='admin'&&Store.users[0].mustChange;
  hint.innerHTML=fresh?`First run — sign in with <b>admin</b> / <b>krg-admin</b>, then set your own password.`:'Contact your administrator if you cannot sign in.';
  setTimeout(()=>$('#li_user')?.focus(),60);
}
async function boot(){
  applyTheme();
  Store.load();
  await Store.seedIfEmpty();
  $('#hamb')?.addEventListener('click',openDrawer);
  $('#drawerBack')?.addEventListener('click',closeDrawer);
  $('#loginForm').addEventListener('submit',async e=>{
    e.preventDefault();
    const err=$('#loginErr');err.classList.remove('show');
    const r=await Auth.login($('#li_user').value,$('#li_pass').value);
    if(!r.ok){err.textContent=r.msg;err.classList.add('show');return;}
    showApp();
  });
  if(Auth.restore())showApp();
  else showLogin();
}
boot();
</script>
