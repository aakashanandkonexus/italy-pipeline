/* ----- User management (admin) ----- */
function editUser(id){
  if(!Auth.can('*')){toast('Admin only','amber');return;}
  const u=id?Store.users.find(x=>x.id===id):null;
  const isSelf=u&&Auth.user&&u.id===Auth.user.id;
  openModal(`<div class="modal-h">${svg('admin',19)}<h3>${id?'Edit user':'New user'}</h3><button class="x" onclick="closeModal()">${svg('close',18)}</button></div>
    <div class="modal-b"><div class="form-grid">
      ${fld('Full name','u_name',u?.name)}
      ${fld('Username','u_user',u?.username)}
      <div class="fg"><label>Role</label><select class="inp" id="u_role" ${isSelf?'disabled':''}>${Object.entries(ROLES).map(([k,r])=>`<option value="${k}" ${u?.role===k?'selected':''}>${r.label}</option>`).join('')}</select></div>
      <div class="fg"><label>Status</label><select class="inp" id="u_active" ${isSelf?'disabled':''}><option value="1" ${u?.active!==false?'selected':''}>Active</option><option value="0" ${u?.active===false?'selected':''}>Disabled</option></select></div>
      <div class="fg" style="grid-column:1/-1"><label>${id?'Reset password (leave blank to keep)':'One-time password'}</label>
        <div style="display:flex;gap:8px"><input class="inp" id="u_pw" style="flex:1" placeholder="${id?'••••••':'click Generate'}" value=""><button class="btn btn-ghost btn-sm" type="button" id="u_gen">${svg('lock',14)}<span>Generate</span></button></div></div>
    </div>
    ${id?`<label class="chk" style="margin-top:6px"><input type="checkbox" id="u_must" ${u?.mustChange?'checked':''}> Require password change at next login</label>`:`<div class="callout grey" style="margin-top:10px">${svg('alert',16)}<div>New users get a one-time password and must set their own on first sign-in. Generate one, then copy the credentials on the next screen.</div></div>`}
    ${isSelf?`<div class="callout grey" style="margin-top:10px">${svg('alert',16)}<div>You cannot change your own role or disable your own account.</div></div>`:''}</div>
    <div class="modal-f">${id&&!isSelf?`<button class="btn btn-danger btn-sm" id="mDel" style="margin-right:auto">${svg('trash',14)}<span>Delete</span></button>`:''}<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="mSave">${id?'Save':'Create user'}</button></div>`);
  $('#u_gen').onclick=()=>{$('#u_pw').value=genPassword();};
  $('#mSave').onclick=async()=>{
    const name=gv('u_name'),username=gv('u_user').toLowerCase(),role=gv('u_role'),pw=gv('u_pw'),active=gv('u_active')==='1';
    if(!username){toast('Username required','amber');return;}
    if(Store.users.some(x=>x.username===username&&x.id!==id)){toast('Username already exists','amber');return;}
    if(id){u.name=name;u.username=username;if(!isSelf){u.role=role;u.active=active;}
      if(pw){const salt=rndSalt();u.salt=salt;u.hash=await hashPw(pw,salt);u.mustChange=true;}
      if($('#u_must'))u.mustChange=$('#u_must').checked;
      audit('user updated',username);
      Store.saveUsers();toast('User saved','green');closeModal();route();
    } else {
      const otp=pw||genPassword();
      const salt=rndSalt();Store.users.push({id:uid('usr'),name,username,role,active:true,mustChange:true,created:iso(new Date()),salt,hash:await hashPw(otp,salt)});
      audit('user created',username);Store.saveUsers();route();
      showCredentials(name||username,username,otp);
    }
  };
  const db=$('#mDel');if(db)db.onclick=()=>{if(confirm('Delete user '+u.username+'?')){Store.users=Store.users.filter(x=>x.id!==id);Store.saveUsers();audit('user deleted',u.username);toast('User deleted','green');closeModal();route();}};
}

  const block=`Login link: ${link}\nUsername:   ${username}\nOne-time password: ${otp}`;
  openModal(`<div class="modal-h">${svg('check',19)}<h3>User created — share these credentials</h3><button class="x" onclick="closeModal()">${svg('close',18)}</button></div>
    <div class="modal-b">
      <div class="callout amber" style="margin-bottom:14px">${svg('alert',16)}<div>Copy these now — the one-time password is not stored in readable form and can't be shown again. ${esc(name)} will be asked to set a new password at first sign-in.</div></div>
      <div class="form-grid">
        <div class="fg full"><label>Login link</label><div style="display:flex;gap:8px"><input class="inp" id="cr_link" style="flex:1" readonly value="${esc(link)}"><button class="btn btn-ghost btn-sm" data-copy="cr_link">Copy</button></div></div>
        <div class="fg"><label>Username</label><div style="display:flex;gap:8px"><input class="inp" id="cr_user" style="flex:1" readonly value="${esc(username)}"><button class="btn btn-ghost btn-sm" data-copy="cr_user">Copy</button></div></div>
        <div class="fg"><label>One-time password</label><div style="display:flex;gap:8px"><input class="inp mono" id="cr_pw" style="flex:1" readonly value="${esc(otp)}"><button class="btn btn-ghost btn-sm" data-copy="cr_pw">Copy</button></div></div>
        <div class="fg full"><label>All together</label><textarea class="inp" id="cr_all" readonly rows="3" style="width:100%;resize:none;font-family:var(--mono);font-size:12px">${esc(block)}</textarea></div>
      </div>
    </div>
    <div class="modal-f"><button class="btn btn-ghost" data-copy="cr_all">Copy all</button><button class="btn btn-primary" onclick="closeModal()">Done</button></div>`,{wide:true,noFocus:true});

/* ---------- I. OCR + IMPORT/EXPORT ---------- */
let _tess=null;
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('load failed '+src));document.head.append(s);});}
async function ensureTesseract(){if(window.Tesseract)return;await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');}
async function ensureXLSX(){if(window.XLSX)return;await loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');}

function parseBLText(txt){
  const T=txt.replace(/\r/g,'');const up=T.toUpperCase();
  const find=re=>{const m=up.match(re);return m?m[1].trim():'';};
  const bl=find(/B\/?L\s*(?:NO\.?|NUMBER)?\s*[:#]?\s*([A-Z]{3,4}\s?[A-Z0-9]{6,})/)||find(/BILL OF LADING\s*(?:NO\.?)?\s*[:#]?\s*([A-Z0-9]{6,})/);
  let port='';for(const p of PORTS){if(up.includes(p)){port=p;break;}}
  const net=find(/NET\s*(?:WEIGHT|WT)?\s*[:#]?\s*([\d.,]{3,})/);
  const gross=find(/GROSS\s*(?:WEIGHT|WT)?\s*[:#]?\s*([\d.,]{3,})/);
  const cont=find(/(\d{1,3})\s*(?:X\s*)?(?:CONTAINER|CNTR|FCL|20'|40')/);
  const eta=find(/(?:ETA|ARRIVAL)\s*[:#]?\s*(\d{1,2}[\/.\-]\d{1,2}[\/.\-]\d{2,4})/);
  const sob=find(/(?:SHIPPED ON BOARD|SOB|LADEN)\s*[:#]?\s*(\d{1,2}[\/.\-]\d{1,2}[\/.\-]\d{2,4})/);
  const clean=s=>s.replace(/[.,](?=\d{3}\b)/g,'').replace(',','.');
  return {bl,port,net:net?clean(net):'',gross:gross?clean(gross):'',cont,eta,sob};
}
function openOCR(){
  if(!requirePerm('edit_shipment','scan BL documents'))return;
  openModal(`<div class="modal-h">${svg('scan',19)}<h3>Scan Bill of Lading</h3><button class="x" onclick="closeModal()">${svg('close',18)}</button></div>
    <div class="modal-b">
      <div class="dropzone" id="ocrDrop"><input type="file" id="ocrFile" accept="image/*,application/pdf" class="hide">
        ${svg('upload',30)}<div style="margin-top:8px;font-weight:600">Drop a BL image here or click to browse</div>
        <div class="hint" style="margin-top:4px">JPG or PNG scans work best. Fields are extracted for review — nothing is saved until you confirm.</div></div>
      <div id="ocrProg" class="hide" style="margin-top:14px"></div>
      <div id="ocrResult" class="hide" style="margin-top:16px"></div>
    </div>
    <div class="modal-f"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary hide" id="ocrUse">${svg('check',15)}<span>Use these fields</span></button></div>`,{wide:true});
  const drop=$('#ocrDrop'),file=$('#ocrFile'),prog=$('#ocrProg'),result=$('#ocrResult');
  drop.onclick=()=>file.click();
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag');};
  drop.ondragleave=()=>drop.classList.remove('drag');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])run(e.dataTransfer.files[0]);};
  file.onchange=()=>{if(file.files[0])run(file.files[0]);};
  let parsed=null;
  async function run(f){
    if(f.type==='application/pdf'){toast('Please upload an image of the BL (PDF OCR not supported in-browser)','amber');return;}
    prog.classList.remove('hide');prog.innerHTML=`<div class="callout grey">${svg('scan',16)}<div>Loading OCR engine…</div></div>`;
    try{
      await ensureTesseract();
      prog.innerHTML=`<div class="callout grey">${svg('scan',16)}<div><div>Reading document…</div><div class="progbar" style="margin-top:8px"><div id="ocrBar" style="width:0%"></div></div></div></div>`;
      const url=URL.createObjectURL(f);
      const {data}=await Tesseract.recognize(url,'eng',{logger:m=>{if(m.status==='recognizing text'){const b=$('#ocrBar');if(b)b.style.width=Math.round(m.progress*100)+'%';}}});
      parsed=parseBLText(data.text);
      prog.classList.add('hide');
      result.classList.remove('hide');
      result.innerHTML=`<div class="hint" style="font-weight:600;color:var(--ink-2);margin-bottom:8px">Review extracted fields</div>
        <div class="form-grid">
          ${fld('BL number','o_bl',parsed.bl)}${seln('Port','o_port',parsed.port,PORTS)}
          ${fld('Net weight (t)','o_net',parsed.net,'number')}${fld('Containers','o_cont',parsed.cont,'number')}
          ${fld('ETA','o_eta',parsed.eta)}${fld('SOB date','o_sob',parsed.sob)}
        </div>
        <details style="margin-top:10px"><summary class="hint" style="cursor:pointer">Raw OCR text</summary><pre style="max-height:130px;overflow:auto;font-size:11px;background:#0d1117;color:#c9d1d9;padding:10px;border-radius:8px;margin-top:6px;white-space:pre-wrap">${esc(data.text.slice(0,1500))}</pre></details>`;
      $('#ocrUse').classList.remove('hide');
      $('#ocrUse').onclick=()=>{closeModal();editShipment(null);setTimeout(()=>{const set=(id,v)=>{const n=$('#'+id);if(n&&v)n.value=v;};set('f_bl',gv('o_bl'));set('f_port',gv('o_port'));set('f_net',gv('o_net'));const eta=gv('o_eta');if(eta){const d=parseDate(eta);if(d)$('#f_eta').value=iso(d);}const sob=gv('o_sob');if(sob){const d=parseDate(sob);if(d)$('#f_sob').value=iso(d);}const ev=new Event('input');['f_port','f_net'].forEach(i=>$('#'+i)?.dispatchEvent(ev));toast('Fields imported — review and save','green');},120);};
      audit('BL scanned',parsed.bl||'(unread)');
    }catch(err){prog.innerHTML=`<div class="callout amber">${svg('alert',16)}<div>Could not run OCR: ${esc(err.message)}. Check your connection (the engine loads from a CDN) or enter the shipment manually.</div></div>`;}
  }
}

/* ----- Excel export/import (SheetJS) ----- */
async function exportSheet(type){
  if(!Auth.can('export')){toast('No export permission','amber');return;}
  try{await ensureXLSX();}catch(e){toast('Could not load export engine (needs connection)','amber');return;}
  const wb=XLSX.utils.book_new();
  const add=(name,rows)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),name);
  const strip=o=>{const {id,...r}=o;return r;};
  if(type==='shipments'||type==='all')add('Shipments',Store.d.shipments.map(deriveShipment).map(strip));
  if(type==='contracts'||type==='all')add('Contracts',Store.d.contracts.map(deriveContract).map(strip));
  if(type==='credit'||type==='all')add('Credit',Store.d.credit.map(strip));
  if(type==='ar'||type==='all')add('Receivables',Store.d.ar.map(deriveAR).map(strip));
  XLSX.writeFile(wb,'krg-'+type+'-'+iso(new Date())+'.xlsx');
  audit('exported '+type);toast('Exported to Excel','green');
}

/* ---------- J. BOOT ---------- */
function showApp(){
  $('#login').classList.add('hide');
  $('#app').style.display='block';
  renderNav();
  if(!location.hash)location.hash='#/dashboard';
  route();
  if(Auth.user.mustChange)setTimeout(forcePasswordChange,250);
}
function showLogin(){
  $('#app').style.display='none';
  $('#login').classList.remove('hide');
  const hint=$('#loginHint');
  const fresh=Store.users.length===1&&Store.users[0].username==='admin'&&Store.users[0].mustChange;
  hint.innerHTML=fresh?`First run — sign in with <b>admin</b> / <b>krg-admin</b>, then set your own password.`:'Contact your administrator if you cannot sign in.';
  setTimeout(()=>$('#li_user')?.focus(),60);
}
async function boot(){
  applyTheme();
  Store.load();
  await Store.seedIfEmpty();
  $('#hamb')?.addEventListener('click',openDrawer);
  $('#drawerBack')?.addEventListener('click',closeDrawer);
  $('#loginForm').addEventListener('submit',async e=>{
    e.preventDefault();
    const err=$('#loginErr');err.classList.remove('show');
    const r=await Auth.login($('#li_user').value,$('#li_pass').value);
    if(!r.ok){err.textContent=r.msg;err.classList.add('show');return;}
    showApp();
  });
  if(Auth.restore())showApp();
  else showLogin();
}
boot();
