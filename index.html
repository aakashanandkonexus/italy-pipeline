<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRG · Aluminium Pipeline</title>
<style>
:root{
  /* KRG brand */
  --brand:#1C57C9; --brand-ink:#1848AE; --brand-2:#2E6FE0; --brand-wash:#E9F0FC;
  --hex:#1C57C9; --navy:#0E1826;
  --green:#12855A; --green-wash:#E4F4EC;
  --amber:#E0561B; --amber-wash:#FBEDE5; --amber-ink:#B23F12;
  --violet:#6B4FBB; --violet-wash:#EEEAF9;
  /* light theme surfaces */
  --bg:#F4F6F9; --bg-2:#EEF1F5;
  --surface:#FFFFFF; --surface-2:#F8FAFC; --surface-3:#EDF1F5;
  --border:#E2E7EE; --border-2:#EDF0F4;
  --text:#12161C; --text-2:#3A424D; --muted:#6B7581;
  --field:#FFFFFF; --code-bg:#0D1117; --code-fg:#C9D1D9;
  --sidebar:#0E1826; --sidebar-2:#0A121D; --sidebar-line:rgba(255,255,255,.06);
  --sidebar-text:#AEB7C2; --sidebar-hi:#FFFFFF; --sidebar-muted:#5C6673;
  --topbar:rgba(244,246,249,.85);
  --shadow:0 1px 2px rgba(16,22,30,.06),0 4px 16px rgba(16,22,30,.06);
  --shadow-lg:0 12px 44px rgba(16,22,30,.20);
  --scroll:#C7CDD5;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --r:11px; --r-sm:8px;
  /* aliases for legacy references (resolve to themed tokens) */
  --blue:var(--brand); --blue-ink:var(--brand-ink); --blue-wash:var(--brand-wash);
  --ink:var(--text); --ink-2:var(--text-2); --line:var(--border); --line-2:var(--border-2); --card:var(--surface); --canvas:var(--bg); --graphite:var(--navy);
}
html[data-theme="dark"]{
  --brand:#4F86F0; --brand-ink:#6E9CF5; --brand-2:#5C90F2; --brand-wash:rgba(79,134,240,.15);
  --green:#3FB68A; --green-wash:rgba(63,182,138,.14);
  --amber:#F0894E; --amber-wash:rgba(240,137,78,.15); --amber-ink:#F0894E;
  --violet:#A38BE8; --violet-wash:rgba(163,139,232,.15);
  --bg:#0C1015; --bg-2:#10151C;
  --surface:#161C24; --surface-2:#1B222C; --surface-3:#232B36;
  --border:#28313C; --border-2:#1F2833;
  --text:#E7EBF1; --text-2:#B7C0CB; --muted:#8A94A1;
  --field:#1B222C; --code-bg:#0A0E13; --code-fg:#C9D1D9;
  --sidebar:#0A0E14; --sidebar-2:#070B10; --sidebar-line:rgba(255,255,255,.055);
  --sidebar-text:#9AA4B0; --sidebar-hi:#F2F5F8; --sidebar-muted:#586170;
  --topbar:rgba(12,16,21,.82);
  --shadow:0 1px 2px rgba(0,0,0,.30),0 6px 20px rgba(0,0,0,.35);
  --shadow-lg:0 16px 50px rgba(0,0,0,.55);
  --scroll:#333D4A;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
a{color:var(--brand);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{filter:brightness(.9)}

/* brand logo lockups */
.krg-logo{height:30px;width:auto;display:block;border-radius:5px}
.krg-chip{background:#fff;border-radius:8px;padding:6px 9px;display:inline-flex;align-items:center;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.hexmark{width:34px;height:34px;flex:none}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;display:flex;background:var(--navy);z-index:100}
.login-brand{flex:1;align-items:center;justify-content:center;text-align:center;background:
   radial-gradient(120% 90% at 12% 8%,#16233A 0%,transparent 55%),
   linear-gradient(160deg,#0B1524 0%,#12203A 60%,#0A1420 100%);
   position:relative;overflow:hidden;display:none;flex-direction:column;justify-content:space-between;padding:52px}
.login-brand::after{content:"";position:absolute;left:0;right:0;top:52%;height:2px;
   background:linear-gradient(90deg,transparent,#2E6FE0 20%,#8FB4F5 50%,#2E6FE0 80%,transparent);filter:blur(.3px);opacity:.45}
.login-brand::before{content:"";position:absolute;width:540px;height:540px;right:-160px;top:50%;transform:translateY(-50%);
   border-radius:50%;background:radial-gradient(circle,rgba(46,111,224,.28),transparent 62%);filter:blur(24px)}
.lb-mark{position:relative;z-index:2}.login-brand .krg-chip{padding:22px 30px}.login-brand .krg-logo{height:64px}
.lb-copy{position:relative;z-index:2;color:#E7EBF0;max-width:460px}
.lb-copy .ey{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#7FA3DE}
.lb-copy h1{font-size:38px;line-height:1.1;font-weight:800;margin:16px 0;letter-spacing:-.02em;color:#F3F6FB}
.lb-copy p{color:#93A2B8;font-size:15px}
.lb-foot{position:relative;z-index:2;font-family:var(--mono);font-size:11px;color:#4E5B70;letter-spacing:.08em}
.login-panel{width:min(470px,100%);background:var(--bg);display:flex;flex-direction:column;justify-content:center;padding:40px}
.lp-inner{width:100%;max-width:348px;margin:0 auto}
.lp-inner .brandrow{display:flex;align-items:center;gap:11px;margin-bottom:24px}
.lp-inner h2{font-size:22px;font-weight:750;letter-spacing:-.01em}
.lp-inner .sub{color:var(--muted);margin:6px 0 26px;font-size:13px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px}
.field input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--field);transition:.15s}
.field input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-wash)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;border-radius:var(--r-sm);font-weight:650;font-size:14px;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 1px 2px rgba(28,87,201,.35)}
.btn-primary:hover{background:var(--brand-ink)}
.btn-full{width:100%}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-weight:600}
.btn-ghost:hover{border-color:var(--muted);background:var(--surface-2)}
.btn-sm{padding:7px 11px;font-size:13px;border-radius:7px}
.btn-danger{background:var(--amber);color:#fff}
.btn-danger:hover{filter:brightness(.94)}
.login-err{background:var(--amber-wash);color:var(--amber-ink);border:1px solid var(--amber);padding:9px 12px;border-radius:7px;font-size:12.5px;margin-bottom:14px;display:none}
.login-err.show{display:block}
.login-hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.login-hint b{color:var(--text-2)}

/* ---------- APP SHELL ---------- */
#app{display:none;height:100%}
.shell{display:grid;grid-template-columns:238px 1fr;height:100%}
.side{background:var(--sidebar);color:var(--sidebar-text);display:flex;flex-direction:column;border-right:1px solid var(--sidebar-2);z-index:60;transition:transform .22s ease}
.side-top{padding:16px 16px 13px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--sidebar-line)}
.side-top .nm{font-weight:750;color:var(--sidebar-hi);font-size:13.5px;letter-spacing:.01em;line-height:1.15}
.side-top .nm small{display:block;font-family:var(--mono);font-size:9.5px;color:var(--sidebar-muted);letter-spacing:.14em;font-weight:500;margin-top:2px}
.nav{padding:10px 12px;flex:1;overflow-y:auto}
.nav-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sidebar-muted);padding:14px 10px 7px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:8px;color:var(--sidebar-text);font-weight:550;font-size:13.5px;margin-bottom:2px;transition:.12s;position:relative}
.nav a svg{width:17px;height:17px;flex:none;opacity:.85}
.nav a:hover{background:rgba(255,255,255,.05);color:var(--sidebar-hi)}
.nav a.active{background:linear-gradient(90deg,var(--brand-wash),rgba(46,111,224,.05));color:var(--sidebar-hi)}
.nav a.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--brand);border-radius:0 3px 3px 0}
.nav a.active svg{opacity:1;color:var(--brand-2)}
.nav a .cnt{margin-left:auto;font-family:var(--mono);font-size:10.5px;background:rgba(255,255,255,.08);padding:1px 7px;border-radius:20px;color:var(--sidebar-text)}
.side-user{padding:11px 12px;border-top:1px solid var(--sidebar-line);display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:#fff;font-weight:700;font-size:12.5px;flex:none}
.side-user .u-nm{font-size:12.5px;font-weight:650;color:var(--sidebar-hi);line-height:1.1}
.side-user .u-rl{font-family:var(--mono);font-size:10px;color:var(--sidebar-muted);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.side-user button{margin-left:auto;color:var(--sidebar-muted);padding:6px;border-radius:6px}
.side-user button:hover{background:rgba(255,255,255,.06);color:var(--sidebar-hi)}

.main{overflow-y:auto;height:100%;background:var(--bg)}
.topbar{position:sticky;top:0;z-index:30;background:var(--topbar);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px}
.topbar h1{font-size:18px;font-weight:730;letter-spacing:-.01em}
.topbar .crumb{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.topbar .sp{flex:1}
.hamb{display:none;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-2)}
.hamb:hover{background:var(--surface-2)}
.content{padding:24px 28px 64px;max-width:1560px;position:relative}

/* theme toggle + top user */
.theme-tog{display:inline-flex;background:var(--surface-3);border-radius:9px;padding:3px;gap:2px}
.theme-tog button{width:30px;height:28px;border-radius:6px;display:grid;place-items:center;color:var(--muted)}
.theme-tog button svg{width:15px;height:15px}
.theme-tog button.on{background:var(--surface);color:var(--brand);box-shadow:var(--shadow)}
.top-user{display:flex;align-items:center;gap:9px;padding:5px 10px 5px 6px;border:1px solid var(--border);border-radius:22px;background:var(--surface)}
.top-user .avatar{width:26px;height:26px;font-size:11px}
.top-user .tu-nm{font-size:12.5px;font-weight:650;line-height:1}
.top-user .tu-rl{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.top-user .tu-out{color:var(--muted);padding:3px;border-radius:6px;display:grid;place-items:center}
.top-user .tu-out:hover{color:var(--amber)}

.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.02em;white-space:nowrap}
.chip.green{background:var(--green-wash);color:var(--green)}
.chip.blue{background:var(--brand-wash);color:var(--brand-ink)}
.chip.amber{background:var(--amber-wash);color:var(--amber-ink)}
.chip.grey{background:var(--surface-3);color:var(--muted)}
.chip.violet{background:var(--violet-wash);color:var(--violet)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* cards / KPIs */
.grid{display:grid;gap:15px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(186px,1fr));margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .12s,box-shadow .12s,border-color .12s}
.kpi.clickable{cursor:pointer}
.kpi.clickable:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--brand)}
.kpi.clickable::after{content:"";position:absolute;right:12px;top:14px;width:14px;height:14px;opacity:.3;background:currentColor;-webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2.5'><path d='M7 17L17 7M17 7H8M17 7v9'/></svg>") center/contain no-repeat;mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2.5'><path d='M7 17L17 7M17 7H8M17 7v9'/></svg>") center/contain no-repeat;color:var(--muted)}
.kpi .k-lbl{font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:.02em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.kpi .k-val{font-family:var(--mono);font-size:25px;font-weight:600;margin-top:9px;letter-spacing:-.01em;line-height:1}
.kpi .k-val small{font-size:13px;color:var(--muted);font-weight:500}
.kpi .k-sub{font-size:11.5px;color:var(--muted);margin-top:7px;font-family:var(--mono)}
.kpi .k-accent{position:absolute;left:0;top:0;bottom:0;width:3px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-h{padding:13px 17px;border-bottom:1px solid var(--border-2);display:flex;align-items:center;gap:12px}
.card-h h3{font-size:14px;font-weight:700;letter-spacing:-.005em}
.card-h .hint{font-size:12px;color:var(--muted);font-weight:500}
.card-h .sp{flex:1}
.card-b{padding:16px 17px}
.card-b.flush{padding:0}

/* tables */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface-2);position:sticky;top:0;white-space:nowrap;z-index:1}
table.tbl td{padding:9px 12px;border-bottom:1px solid var(--border-2);vertical-align:middle;white-space:nowrap}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tbody tr{transition:background .1s}
table.tbl tbody tr:hover{background:var(--surface-2)}
table.tbl td.num,table.tbl th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
.t-strong{font-weight:650;color:var(--text)}
.t-sub{color:var(--muted);font-size:12px}
.rowlink{cursor:pointer}
.rowlink:hover{background:var(--brand-wash)!important}

.toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:16px}
.toolbar .sp{flex:1}
.inp,select.inp{padding:8px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--field);min-width:120px;transition:.15s}
.inp:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-wash)}
.search{position:relative}
.search input{padding-left:33px;min-width:220px}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted)}
.seg{display:inline-flex;background:var(--surface-3);border-radius:9px;padding:3px}
.seg button{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;color:var(--text-2)}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

.ubar{height:7px;background:var(--surface-3);border-radius:5px;overflow:hidden;min-width:90px}
.ubar span{display:block;height:100%;border-radius:5px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px}
@media(max-width:1100px){.two-col,.three-col{grid-template-columns:1fr}}

/* modal */
.modal-back{position:fixed;inset:0;background:rgba(8,12,18,.55);backdrop-filter:blur(3px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:36px 16px;overflow-y:auto}
.modal-back.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:15px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;animation:pop .18s ease}
.modal.wide{max-width:840px}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
.modal-h{padding:17px 22px;border-bottom:1px solid var(--border-2);display:flex;align-items:center;gap:12px}
.modal-h h3{font-size:16px;font-weight:730}
.modal-h svg{color:var(--brand)}
.modal-h .x{margin-left:auto;color:var(--muted);padding:6px;border-radius:6px}
.modal-h .x:hover{background:var(--surface-3);color:var(--text)}
.modal-b{padding:22px}
.modal-f{padding:14px 22px;border-top:1px solid var(--border-2);display:flex;gap:10px;justify-content:flex-end;background:var(--surface-2);border-radius:0 0 15px 15px;flex-wrap:wrap}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--field)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-wash)}
.fg .ro{background:var(--surface-3);color:var(--muted)}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty svg{width:36px;height:36px;opacity:.4;margin-bottom:12px}
.empty h4{font-size:15px;color:var(--text-2);font-weight:650;margin-bottom:4px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:550;box-shadow:var(--shadow-lg);z-index:300;opacity:0;pointer-events:none;transition:.25s;display:flex;align-items:center;gap:10px}
html[data-theme="dark"] #toast{background:#04070B;border:1px solid var(--border)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .dot{width:8px;height:8px}

/* lifecycle ingot track */
.track{display:flex;gap:0;margin:8px 0 4px;overflow-x:auto;padding-bottom:6px}
.stage{flex:1;min-width:140px;position:relative;padding:0 6px}
.stage .node{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--surface-3);color:var(--muted);border:2px solid var(--surface);box-shadow:0 0 0 1px var(--border);position:relative;z-index:2}
.stage .node svg{width:16px;height:16px}
.stage.done .node{background:var(--green);color:#fff;box-shadow:0 0 0 1px var(--green)}
.stage.active .node{background:var(--brand);color:#fff;box-shadow:0 0 0 4px var(--brand-wash)}
.stage::after{content:"";position:absolute;top:16px;left:50%;right:-50%;height:3px;background:var(--border);z-index:1}
.stage:last-child::after{display:none}
.stage.seg-green::after{background:var(--green)}
.stage .st-nm{font-size:12px;font-weight:650;margin-top:9px;color:var(--text)}
.stage .st-dt{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
.stage .st-tag{font-family:var(--mono);font-size:10px;margin-top:4px}

.callout{background:var(--brand-wash);border:1px solid var(--brand);border-radius:9px;padding:12px 14px;font-size:12.5px;color:var(--brand-ink);display:flex;gap:10px}
html[data-theme="dark"] .callout{border-color:rgba(79,134,240,.4)}
.callout.amber{background:var(--amber-wash);border-color:var(--amber);color:var(--amber-ink)}
.callout.grey{background:var(--surface-2);border-color:var(--border);color:var(--text-2)}
.callout svg{width:17px;height:17px;flex:none;margin-top:1px}

.divider{height:1px;background:var(--border-2);margin:18px 0}
.metric-row{display:flex;gap:24px;flex-wrap:wrap}
.metric .m-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.metric .m-v{font-family:var(--mono);font-size:19px;font-weight:600;margin-top:3px}
.hide{display:none!important}
.dropzone,.dz{border:2px dashed var(--border);border-radius:11px;padding:26px;text-align:center;color:var(--muted);transition:.15s;cursor:pointer;background:var(--surface-2)}
.dropzone:hover,.dz:hover,.dz.drag,.dropzone.drag{border-color:var(--brand);background:var(--brand-wash);color:var(--brand-ink)}
.dropzone svg,.dz svg{width:30px;height:30px;opacity:.6;margin-bottom:8px}
.progbar{height:8px;background:var(--surface-3);border-radius:5px;overflow:hidden}
.progbar>div{height:100%;background:var(--brand);border-radius:5px;transition:width .2s}
kbd{font-family:var(--mono);font-size:11px;background:var(--surface-3);border:1px solid var(--border);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--text-2)}
.badge-role{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-role.admin{background:var(--violet-wash);color:var(--violet)}
.badge-role.manager{background:var(--brand-wash);color:var(--brand-ink)}
.badge-role.operator{background:var(--green-wash);color:var(--green)}
.badge-role.viewer{background:var(--surface-3);color:var(--muted)}
.badge-role.accounts{background:var(--amber-wash);color:var(--amber)}
.badge-role.controller{background:var(--brand-wash);color:var(--brand-ink)}
.badge-role.trade_finance{background:var(--green-wash);color:var(--green)}
/* allocation overview grid */
.pipeline-grid td,.pipeline-grid th{vertical-align:top;border-right:1px solid var(--border-2)}
.pipeline-grid .sticky-col{position:sticky;left:0;background:var(--surface);z-index:2;box-shadow:1px 0 0 var(--border);min-width:96px}
.pipeline-grid thead .sticky-col{z-index:3;background:var(--surface-2)}
.pipeline-grid .pq-port .sticky-col,.pipeline-grid tr.pq-port td{background:var(--surface-2);font-weight:750;letter-spacing:.05em;text-transform:uppercase;font-size:11px;color:var(--brand-ink)}
.pq-cell{min-width:186px}
.pq-cell.empty{background:repeating-linear-gradient(45deg,transparent,transparent 7px,var(--surface-2) 7px,var(--surface-2) 8px)}
.pq-arr{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-bottom:5px}
.pq-alloc{display:flex;justify-content:space-between;gap:6px;align-items:center;background:var(--brand-wash);color:var(--brand-ink);border-radius:6px;padding:3px 7px;margin-bottom:3px;font-size:11.5px;cursor:pointer}
.pq-alloc:hover{outline:1px solid var(--brand)}
.pq-alloc b{font-family:var(--mono)}
.pq-rem{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-top:4px}
.pq-rem.pos{color:var(--green)}
.pq-rem.neg{color:var(--amber)}
.pq-add{margin-top:6px;font-size:11px;color:var(--brand);border:1px dashed var(--border);border-radius:6px;padding:3px 7px;width:100%;text-align:center}
.pq-add:hover{border-color:var(--brand);background:var(--brand-wash)}
.pq-h{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.tbl-center td,.tbl-center th{text-align:center!important}

/* Italy watermark */
.italy-wrap{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.italy-map{position:absolute;right:-40px;top:10px;height:118%;width:auto;color:var(--brand);opacity:.05}
html[data-theme="dark"] .italy-map{opacity:.07}
.dash-body{position:relative;z-index:1}

/* mobile drawer backdrop */
#drawerBack{position:fixed;inset:0;background:rgba(8,12,18,.5);z-index:55;display:none}
#drawerBack.show{display:block}

/* ---------- responsive ---------- */
@media(min-width:900px){.login-brand{display:flex}}
@media(max-width:1000px){
  .shell{grid-template-columns:1fr}
  .side{position:fixed;top:0;left:0;bottom:0;width:250px;transform:translateX(-100%)}
  .side.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
  .hamb{display:grid;place-items:center}
  .topbar{padding:11px 15px}
  .content{padding:18px 15px 60px}
  .topbar h1{font-size:16px}
}
@media(max-width:640px){
  .top-user .tu-meta{display:none}
  .top-user{padding:5px;border:none;background:none}
  .theme-tog button{width:28px}
  .form-grid{grid-template-columns:1fr}
  .modal-f{justify-content:stretch}
  .modal-f .btn{flex:1}
  .metric-row{gap:16px}
  .kpi .k-val{font-size:22px}
  .topbar .crumb{display:none}
  .content{padding:14px 12px 54px}
}

</style>
</head>

const parseDate=v=>{if(!v)return null;if(v instanceof Date)return v;const s=String(v);const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);const d=new Date(s);return isNaN(d)?null:d;};
const fmtDate=v=>{const d=parseDate(v);return d?`${String(d.getDate()).padStart(2,'0')} ${MON[d.getMonth()]} ${d.getFullYear()}`:'—';};
const fmtMY=v=>{const d=parseDate(v);return d?`${MON[d.getMonth()]} ${d.getFullYear()}`:'—';};
const iso=d=>d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`:null;
const addDays=(v,n)=>{const d=parseDate(v);if(!d)return null;const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const today=()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate());};
// working-day / Italian public-holiday helpers (for receivable-date roll-forward)
const isWeekend=d=>{const g=d.getDay();return g===0||g===6;};
function easterSunday(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,da);}
function italianHolidays(y){const E=easterSunday(y);const em=new Date(E);em.setDate(E.getDate()+1);

function isHoliday(d){return italianHolidays(d.getFullYear()).has(`${d.getMonth()+1}-${d.getDate()}`);}
function nextWorkday(v){let d=parseDate(v);if(!d)return null;d=new Date(d);let guard=0;while((isWeekend(d)||isHoliday(d))&&guard<40){d.setDate(d.getDate()+1);guard++;}return d;}

/* ---------- D. DATA JOINS / CUSTOMER RESOLUTION ---------- */
const LEGAL=/\b(S\.?P\.?A\.?|S\.?R\.?L\.?|SOCIETA'?|PER AZIONI|EXTRUSION|SISTEMI|CAVI|PRODOTTI|INDUSTRIES|METALLI|ALLUMINIO|IN SIGLA|IN BREVE|LT)\b/g;
function canon(s){
  if(!s)return'';
  let x=String(s).toUpperCase().replace(/&/g,' AND ').replace(/["'.\-,/()]/g,' ');
  x=x.replace(LEGAL,' ').replace(/\s+/g,' ').trim();
  return x;
}
// canonical key = first 2 significant tokens (handles APS AROSIO, TRAFILERIE EMILIANE SUD, etc.)
function custKey(s){
  const c=canon(s);if(!c)return'';
  const t=c.split(' ').filter(Boolean);
  if(t[0]==='TRAFILERIE')return t.slice(0,3).join(' ');
  if(['APS','ALL','MV','DE'].includes(t[0]))return t.slice(0,2).join(' ');
  return t[0];
}
// Build a directory of customers keyed by custKey, merging credit + contract + AR identities
function customerDirectory(){
  const dir={};
  const ensure=k=>dir[k]||(dir[k]={key:k,names:new Set(),credit:null,contracts:[],ar:[]});
  Store.d.credit.forEach(c=>{const k=custKey(c['Short Name']||c['Full Company Name']);const e=ensure(k);e.credit=c;e.names.add(c['Full Company Name']||c['Short Name']);});
  Store.d.contracts.forEach(ct=>{const k=custKey(ct.Customer);const e=ensure(k);e.contracts.push(ct);e.names.add(ct.Customer);});
  Store.d.ar.forEach(a=>{const k=custKey(a.CUSTOMER);const e=ensure(k);e.ar.push(a);e.names.add(a.CUSTOMER);});
  Object.values(dir).forEach(e=>{
    e.display=e.credit?.['Full Company Name']||[...e.names].sort((a,b)=>String(b).length-String(a).length)[0]||e.key;
    e.short=e.credit?.['Short Name']||[...e.names][0]||e.key;
  });
  return dir;
}
function creditLine(entry){return num(entry?.credit?.['KRG Limit Status'])??0;}
function openAR(entry){return entry.ar.filter(a=>(a.Status||'Open')!=='Paid').reduce((s,a)=>s+(num(a['TOTAL AMOUNT'])||0),0);}
function availableLine(entry){return creditLine(entry)-openAR(entry);}
function shipmentByBL(bl){if(!bl)return null;return Store.d.shipments.find(s=>String(s['BL NUMBER']).trim()===String(bl).trim())||null;}
function steinwegCIF(port){const row=Store.d.steinweg.find(s=>String(s.Port||'').toUpperCase().includes(String(port||'').toUpperCase())&&port);return row?num(row['CIF to FCA (min 25 tonx cntr)']):null;}

/* ---------- E. BUSINESS RULES (mirror of the workbook formulas) ---------- */
function termDays(name){
  if(!name)return null;
  const t=Store.d.paymentTerms.find(p=>String(p.term).toLowerCase().trim()===String(name).toLowerCase().trim());
  if(t)return num(t.days);
  const m=String(name).match(/(\d+)/);
  if(/eom/i.test(name))return m?num(m[1])+25:null;
  return m?num(m[1])+10:null;
}
// product detection from diameter/spec text
function isWireRod(txt){return /wire\s*rod|w\.?rod|\bwr\b/i.test(String(txt||''));}
function productOf(txt){return isWireRod(txt)?'Wire Rods':'Billets';}
function dutyRateFor(txt){const c=Store.d.config; return isWireRod(txt)?(c.dutyRateWireRod??0.075):(c.dutyRateBillet??c.dutyRate??0.06);}
// quota label e.g. "Jul Q"
function quotaLabel(d){const dt=parseDate(d);if(!dt)return'';return dt.toLocaleString('en-GB',{month:'short'})+" Q";}
// Shipments: containers=net/25 · duty=price*net*rate(billet 6% / wire rod 7.5%) · stwg=CIF(port)*net · invoice=price*net
function deriveShipment(s){
  const net=num(s['NET WEIGHT']), price=num(s['PRICE MT']);
  const containers = net!=null? net/25 : num(s['NO. OF CONTAINERS']);
  const rate=dutyRateFor(s.DIAMETER);
  const duty = (price!=null&&net!=null)? price*net*rate : num(s['CUSTOM DUTIES COST']);
  const cif=steinwegCIF(s['PORT OF DELIVERY']);
  const stwg = (cif!=null&&net!=null)? cif*net : num(s['STWG COST']);
  const invoice = (price!=null&&net!=null)? price*net : num(s['INVOICE VALUE']);
  return {...s,_product:productOf(s.DIAMETER),_dutyRate:rate,_containers:containers,_duty:duty,_stwg:stwg,_invoice:invoice,_track:trackingState(s)};
}
// live BL tracking (auto-refreshes every render; daily sync stamp in config.lastTrackSync)
function trackingState(s){
  const eta=parseDate(s.ETA), t=today();
  const arrived=/arrived|delivered|cleared/i.test(String(s['SHIPMENT STATUS']||''))||String(s['CD PAID STATUS']||'').toLowerCase()==='paid';
  if(!eta)return{status:'unknown',label:'Awaiting ETA',chip:'grey',days:null};
  const d=daysBetween(t,eta);
  if(arrived||d<0)return{status:'arrived',label:'Arrived',chip:'green',days:d};
  if(d===0)return{status:'arriving',label:'Arriving today',chip:'blue',days:0};
  if(d<=3)return{status:'arriving',label:`Arriving · ${d}d`,chip:'blue',days:d};
  if(d<=10)return{status:'nearing',label:`Nearing · ${d}d`,chip:'blue',days:d};
  return{status:'transit',label:`In transit · ${d}d`,chip:'grey',days:d};
}
function autoTrackSync(force){
  const c=Store.d.config; const t=iso(today());
  if(force||c.lastTrackSync!==t){c.lastTrackSync=t;Store.save();}
  return c.lastTrackSync;
}
// Contracts:  lots=tonnage/25 · release=ETA+10 · delivery=release+10 · receivable=delivery+termDays
//             finalPrice=(LME+premium)/FX · priced/averaging/unpriced/unsold lot split
function deriveContract(ct){
  const tonnage=num(ct.Tonnage);
  const lots = tonnage!=null? tonnage/25 : num(ct.Lots);
  const sh=shipmentByBL(ct['BL Allocation']);
  const eta = (sh&&sh.ETA) || ct['Current ETA'] || null;
  const release = ct['Release Date'] || (eta?iso(addDays(eta,Store.d.config.etaToRelease)):null);
  // delivery: actual date if entered, else ETA-derived, else the 15th of the assigned quota month
  let delivery = ct['Delivery Date'] || (release?iso(addDays(release,Store.d.config.releaseToDelivery)):null);
  if(!delivery && ct.Quota){ const qm=quotaMid(ct.Quota); if(qm) delivery=iso(qm); }
  const td=termDays(ct['Payment Terms']);
  // receivable = delivery + term, rolled forward off weekends/holidays to the next working day
  const receivable = ct['Receivable Date'] || (delivery&&td!=null?iso(nextWorkday(addDays(delivery,td))):null);
  const lme=ct.LME, fx=num(ct.FX), prem=num(ct.Premium);
  const baseTon=tonnage||0;
  const avgFlag = ct.Averaging===true || (typeof lme==='string'&&/avg/i.test(lme));
  // pricing tranches: use explicit array as-is (even if empty). Only synthesise from
  // legacy single LME/FX/Final Price when pricings has NEVER been set (undefined).
  let tranches;
  if(Array.isArray(ct.pricings)){
    tranches=ct.pricings.slice();
  } else {
    tranches=[];
    if(!avgFlag){
      let legacyFP=null;
      if(num(lme)!=null&&fx) legacyFP=(num(lme)+(prem||0))/fx;
      else if(num(ct['Final Price'])!=null) legacyFP=num(ct['Final Price']);
      if(legacyFP!=null) tranches=[{ton:baseTon,lme:num(lme),fx:num(fx),prem:prem,fp:legacyFP,date:ct['Priced Date']||null,legacy:true}];
    }
  }
  const pricedTon=tranches.reduce((s,p)=>s+(num(p.ton)||0),0);
  const openTon=Math.max(0,baseTon-pricedTon);
  const wfp = pricedTon>0? tranches.reduce((s,p)=>s+(num(p.ton)||0)*(num(p.fp)||0),0)/pricedTon : null;
  const fullyPriced = pricedTon>=baseTon-1e-6 && baseTon>0;
  // "averaging" (as a lot-status bucket) only applies while the averaging lot is still awaiting its final price
  const isAvg = avgFlag && !fullyPriced;
  const avgActive = avgFlag && ct.avgEnd && parseDate(ct.avgEnd) && parseDate(ct.avgEnd)>=today(); // period not yet ended
  const status = isAvg?'Avg' : fullyPriced?'P' : pricedTon>0?'PP':'NP';
  const pricedLots=pricedTon/25, openLots=openTon/25, avgLots=isAvg?(openTon/25):0;
  return {...ct,_lots:lots,_eta:eta,_release:release,_delivery:delivery,_receivable:receivable,
          _tranches:tranches,_pricedTon:pricedTon,_openTon:openTon,_baseTon:baseTon,
          _avgFlag:avgFlag,_avgActive:avgActive,
          _finalPrice:wfp,_priced:status==='P'?'P':status==='NP'?'NP':status,_status:status,
          _pricedLots:pricedLots,_avgLots:avgLots,_unpricedLots:isAvg?0:openLots,_unsold:0,_isAvg:isAvg,_shipment:sh};
}
// AR:  total = price * tonnage
function deriveAR(a){const t=num(a['NET TONNAGE']),p=num(a.PRICE);return {...a,_total:(t!=null&&p!=null)?t*p:num(a['TOTAL AMOUNT'])};}

function calcDueDate(deliveryDate,term){
  const d=parseDate(deliveryDate);if(!d)return null;
  if(term.days==='EOM30'||term.days==='EOM60'){const eom=new Date(d.getFullYear(),d.getMonth()+1,0);return addDays(eom,term.days==='EOM30'?30:60);}
  return addDays(d,num(term.days));
}
// Tonnage deliverable = availableLine / finalPrice ; finalPrice = LME + premium (optionally /FX)
function tonnageFor(availLine,lme,prem,fx){
  const fp=(num(lme)||0)+(num(prem)||0);
  const price = fx&&num(fx)? fp/num(fx) : fp;
  if(!price||price<=0)return null;
  return {finalPrice:price, tonnage:availLine/price, lots:(availLine/price)/25};
}

/* pipeline-wide aggregates */
function agg(){
  const C=Store.d.contracts.map(deriveContract);
  const dir=customerDirectory();
  const totTon=C.reduce((s,c)=>s+(num(c.Tonnage)||0),0);
  const lots={priced:0,avg:0,unpriced:0,unsold:0,total:0};
  C.forEach(c=>{lots.priced+=c._pricedLots;lots.avg+=c._avgLots;lots.unpriced+=c._unpricedLots;lots.unsold+=c._unsold;lots.total+=(c._lots||0);});
  let lineTot=0,arOpen=0,arOverdue=0;
  Object.values(dir).forEach(e=>{lineTot+=creditLine(e);});
  Store.d.ar.forEach(a=>{const t=num(a['TOTAL AMOUNT'])||0;if((a.Status||'Open')!=='Paid'){arOpen+=t;if(parseDate(a['DUE DATE'])&&parseDate(a['DUE DATE'])<today())arOverdue+=t;}});
  const inTransit=Store.d.shipments.filter(s=>parseDate(s.ETA)&&parseDate(s.ETA)>=today()).length;
  return {C,dir,totTon,lots,lineTot,arOpen,arOverdue,inTransit,
          contracts:new Set(C.map(c=>c['S Number'])).size, shipments:Store.d.shipments.length, customers:Object.keys(dir).length};
}

function renderNav(){

/* ---------- THEME (light / dark / auto) ---------- */
const THEME_KEY='krg_theme_v1';
function systemDark(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;}
function applyTheme(){
  const pref=localStorage.getItem(THEME_KEY)||'auto';
  const resolved=pref==='auto'?(systemDark()?'dark':'light'):pref;
  document.documentElement.setAttribute('data-theme',resolved);
  document.documentElement.style.colorScheme=resolved;
}
function setTheme(pref){localStorage.setItem(THEME_KEY,pref);applyTheme();renderThemeToggle();}
function renderThemeToggle(){
  const host=$('#themeTog');if(!host)return;
  const pref=localStorage.getItem(THEME_KEY)||'auto';
  const opt=[['auto','auto','Auto'],['light','sun','Light'],['dark','moon','Dark']];
  host.innerHTML=opt.map(([k,ic,lbl])=>`<button data-th="${k}" class="${pref===k?'on':''}" title="${lbl} theme" aria-label="${lbl} theme">${svg(ic,15)}</button>`).join('');
  host.querySelectorAll('[data-th]').forEach(b=>b.onclick=()=>setTheme(b.dataset.th));
}
if(window.matchMedia){window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{if((localStorage.getItem(THEME_KEY)||'auto')==='auto')applyTheme();});}

/* ---------- MOBILE DRAWER ---------- */
function openDrawer(){$('#side')?.classList.add('open');$('#drawerBack')?.classList.add('show');}
function closeDrawer(){$('#side')?.classList.remove('open');$('#drawerBack')?.classList.remove('show');}
function route(){
  let id=(location.hash.replace(/^#\//,'')||'dashboard').split('?')[0];
  const v=VIEWS.find(x=>x.id===id)||VIEWS[0];
  if(v.adminOnly&&Auth.user.role!=='admin'){toast('Admin access only','amber');location.hash='#/dashboard';return;}
  if(v.perm&&!Auth.can(v.perm)){toast('You don\u2019t have access to this section','amber');location.hash='#/dashboard';return;}
  $$('#nav a').forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#/'+v.id));
  $('#viewTitle').textContent=v.label; $('#crumb').textContent=v.group;
  $('#topActions').innerHTML=''; 
  const view=$('#view'); view.innerHTML=''; window.scrollTo(0,0);
  RENDER[v.id]?.(view);
}
window.addEventListener('hashchange',route);

function custShort(name){const d=customerDirectory();const e=d[custKey(name)];return e?e.short:name;}

    const d=deriveContract(line);

    const avgEnd=line.avgEnd?parseDate(line.avgEnd):null;

              <div class="fg"><label>Averaging start</label><input class="inp" id="pr_as" type="date" value="${esc(line.avgStart||'')}"></div>

            </div>

function buyerInfo(custName){
  const dir=customerDirectory();let e=dir[custKey(custName)];let c=e?.credit;
  if(!c||!c['VAT CODE']){
    // fallback: direct case-insensitive match on full/short name (canon fuzzy matching can miss)
    const norm=s=>String(s||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
    const t=norm(custName);
    c=Store.d.credit.find(r=>{const f=norm(r['Full Company Name']),s=norm(r['Short Name']);return f===t||s===t||(t&&(f.includes(t)||t.includes(s)&&s.length>3))})||c;
  }
  const addr=c?[c.Column1,c.Column2,c.Column3].map(x=>String(x||'').replace(/\u00a0/g,' ').trim()).filter(Boolean):[];
  return {name:(c&&c['Full Company Name'])||custName||'',address:addr,vat:c?.['VAT CODE']||''};
}

// contract lines for a customer, best-matched to a receivable's delivery quota (for provisional amount + contract no)
function contractLinesFor(custName){
  const k=custKey(custName);
  return Store.d.contracts.map(deriveContract).filter(c=>custKey(c.Customer)===k);
}
function bestContractLine(a){
  const lines=contractLinesFor(a.CUSTOMER);if(!lines.length)return null;
  const q=fmtMY(a['DELIVERY Q']);
  return lines.find(l=>l.Quota&&fmtMY(l.Quota)===q&&(l['Prov Inv Amount']!=null||l['Prov Inv No']))
    || lines.find(l=>l.Quota&&fmtMY(l.Quota)===q)
    || lines.find(l=>l['Prov Inv Amount']!=null) || lines[0];
}
function bundlesForLine(l){
  if(!l)return null;const sh=shipmentByBL(l['BL Allocation']);if(!sh)return null;
  const byPb={};shipContainers(sh).forEach(c=>{if(String(c.pb||'').trim())byPb[c.pb]=c;});
  const picked=(Array.isArray(l.pbAlloc)?l.pbAlloc:[]).map(pb=>byPb[pb]).filter(Boolean);
  if(!picked.length)return null;
  return picked.reduce((s,c)=>s+(num(c.bundles)||0),0);
}
const ONES=['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
const TENS=['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
function words999(n){let s='';if(n>=100){s+=ONES[Math.floor(n/100)]+' hundred';n%=100;if(n)s+=' ';}if(n>=20){s+=TENS[Math.floor(n/10)];n%=10;if(n)s+='-'+ONES[n];}else if(n)s+=ONES[n];return s;}
function numToWords(n){
  n=Math.floor(Math.abs(n));if(n===0)return'zero';
  const g=['',' thousand',' million',' billion'];let i=0,out='';
  while(n>0){const c=n%1000;if(c)out=words999(c)+g[i]+(out?' '+out:'');n=Math.floor(n/1000);i++;}
  return out.trim();
}
function amountInWords(amt,ccy){
  const cur=(ccy||'EUR').toUpperCase();const unit=cur==='USD'?['Dollars','Cents']:cur==='GBP'?['Pounds','Pence']:['Euros','Cents'];
  const whole=Math.floor(Math.abs(amt||0));const cents=Math.round((Math.abs(amt||0)-whole)*100);
  const cap=s=>s.replace(/\b\w/g,c=>c.toUpperCase());
  let w=cap(numToWords(whole))+' '+unit[0];
  if(cents>0)w+=' and '+cap(numToWords(cents))+' '+unit[1];
  return w;
}

function arPerformance(a){
  const due=parseDate(a['DUE DATE']), paid=parseDate(a['PAID DATE']);
  if(!due||!paid)return{days:null,chip:'<span class="chip grey">no paid date</span>'};
  const d=daysBetween(paid,due);
  if(d>0)return{days:d,chip:`<span class="chip green">${d}d early</span>`};
  if(d===0)return{days:0,chip:'<span class="chip green">On time</span>'};
  return{days:d,chip:`<span class="chip amber">${-d}d late</span>`};
}

    if(!rows.length){card.querySelector('.tbl-wrap').innerHTML=emptyBox('ship','No shipments match','Adjust filters or upload a BL.');host.append(card);return;}
    const t=el('table',{class:'tbl'});
    t.innerHTML=`<thead><tr><th>ETA</th><th>Tracking</th><th>BL Number</th><th>Steinweg Ref</th><th>Port</th><th>Purchase (Quota)</th><th>Diameter / Spec</th>
      <th class="num">Net t</th><th class="num">Cntrs</th><th>PB / Containers</th><th class="num">Price/t</th><th class="num">Duty</th><th class="num">STWG</th><th class="num">Invoice</th><th>Inv status</th><th>Financier</th></tr></thead>`;

         <td class="num">${fmtT(s['NET WEIGHT'])}</td><td class="num">${fmtN(Math.round(s._containers),0)}</td>
         <td>${Auth.can('edit_shipment')?`<button class="btn btn-ghost btn-sm" data-cnt="${s.id}">${svg('box',13)}<span>${pbCount(s)?fmtN(pbCount(s),0)+' PB':'Add'}</span></button>`:(pbCount(s)?`<span class="chip grey">${fmtN(pbCount(s),0)} PB</span>`:'<span class="t-sub">—</span>')}</td>
         <td class="num">${fmtN(s['PRICE MT'],2)}</td><td class="num" title="${(s._dutyRate*100).toFixed(1)}% ${s._product}">${fmtM(s._duty)}</td><td class="num">${fmtM(s._stwg)}</td>

    });
    t.append(bd);card.querySelector('.tbl-wrap').append(t);host.append(card);
    card.querySelectorAll('[data-cnt]').forEach(b=>b.onclick=e=>{e.stopPropagation();openContainers(b.dataset.cnt);});
  };
  draw();
  $('#shQ').oninput=e=>{shipF.q=e.target.value;draw();};
  $('#shPort').onchange=e=>{shipF.port=e.target.value;draw();};
  $('#shPn').onchange=e=>{shipF.pn=e.target.value;draw();};
  $('#shStatus').onchange=e=>{shipF.status=e.target.value;draw();};
};

/* ---------- G3. SALES CONTRACTS ---------- */
let ctF={q:'',product:'',spec:'',port:'',quota:'',customer:''};
function productSummary(rows,product,color){
  const r=rows.filter(c=>c.Product===product);
  const ton=r.reduce((s,c)=>s+(num(c.Tonnage)||0),0);
  const lots=r.reduce((s,c)=>s+(c._lots||0),0);
  const priced=r.reduce((s,c)=>s+c._pricedLots,0);
  const avg=r.reduce((s,c)=>s+c._avgLots,0);
  const unp=r.reduce((s,c)=>s+c._unpricedLots,0);
  const custs=new Set(r.map(c=>c.Customer)).size;
  const contracts=new Set(r.map(c=>c['S Number'])).size;
  const cov=lots?Math.round(priced/lots*100):0;
  return el('div',{class:'card',html:`
    <div class="card-h"><span class="dot" style="background:${color}"></span><h3>${product}</h3><div class="sp"></div><span class="chip grey">${contracts} contracts · ${custs} customers</span></div>
    <div class="card-b">
      <div class="metric-row" style="margin-bottom:14px">
        <div class="metric"><div class="m-l">Tonnage</div><div class="m-v">${fmtN(ton)} <span style="font-size:12px;color:var(--muted)">t</span></div></div>
        <div class="metric"><div class="m-l">Lots</div><div class="m-v">${fmtN(lots,0)}</div></div>
        <div class="metric"><div class="m-l">Priced</div><div class="m-v" style="color:var(--green)">${cov}%</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:5px"><span>priced ${fmtN(priced,0)}</span><span>averaging ${fmtN(avg,0)}</span><span>open ${fmtN(unp,0)}</span></div>
      <div class="ubar" style="height:9px;display:flex">
        <span style="width:${lots?priced/lots*100:0}%;background:var(--green);border-radius:0"></span>
        <span style="width:${lots?avg/lots*100:0}%;background:${color};border-radius:0"></span>
        <span style="width:${lots?unp/lots*100:0}%;background:var(--amber);border-radius:0"></span>
      </div>
    </div>`});
}

/* ---------- G5. CONTRACT LIFECYCLE ---------- */
const STAGES=[
  {k:'sign',  nm:'Contract signing', ic:'contract'},
  {k:'price', nm:'Pricing',          ic:'tag'},
  {k:'alloc', nm:'Allocation',       ic:'box'},
  {k:'customs',nm:'Customs clearance',ic:'anchor'},
  {k:'deliver',nm:'Delivery',        ic:'truck'},
  {k:'raised', nm:'AR raised',        ic:'receipt'},
  {k:'received',nm:'AR received',     ic:'euro'}
];
function matchARforContract(lines){
  const cust=lines[0]?.Customer;const key=custKey(cust);
  return Store.d.ar.map(deriveAR).filter(a=>custKey(a.CUSTOMER)===key).filter(a=>{
    // same delivery quota month, or delivery date within 45 days of any line delivery
    return lines.some(l=>{
      if(l.Quota&&a['DELIVERY Q']&&fmtMY(l.Quota)===fmtMY(a['DELIVERY Q']))return true;
      const d=daysBetween(l._delivery,a['DELIVERY DATE']);return d!=null&&Math.abs(d)<=45;
    });
  });
}
function computeStages(lines){
  const totLots=lines.reduce((s,l)=>s+(l._lots||0),0);
  const pricedLots=lines.reduce((s,l)=>s+l._pricedLots+l._avgLots,0);
  const allocated=lines.filter(l=>l['BL Allocation']&&!/^tbc$/i.test(l['BL Allocation']));
  const shipments=allocated.map(l=>l._shipment).filter(Boolean);
  // customs: manual status only (default pending)
  const custDoneVals=['Completed','Ready for delivery'];
  let customsState='pending',customsTag='pending';
  if(lines.some(l=>l['Customs Status'])){
    const allDone=lines.every(l=>custDoneVals.includes(l['Customs Status']));
    customsState=allDone?'done':'active';
    customsTag=allDone?(lines.some(l=>l['Customs Status']==='Ready for delivery')?'ready for delivery':'completed'):'in progress';
  }
  // release/delivery: manual status only (default pending)
  const deliveries=lines.map(l=>parseDate(l._delivery)).filter(Boolean);
  const lastDelivery=deliveries.length?new Date(Math.max(...deliveries)):null;
  let delState='pending',delTag='pending',delDate=fmtDate(lastDelivery);
  if(lines.some(l=>l['Release Status'])){
    const allReleased=lines.every(l=>l['Release Status']==='Released');
    delState=allReleased?'done':'active';
    delTag=allReleased?'released':'release requested';
  }
  const arRows=matchARforContract(lines);
  const arRaised=arRows.length>0;
  const arReceived=arRaised&&arRows.every(a=>(a.Status||'Open')==='Paid');
  const st={};
  st.sign={state:'done',date:fmtMY(lines.map(l=>l.Quota).sort()[0]),tag:lines.length+' line'+(lines.length>1?'s':'')};
  st.price={state: pricedLots>=totLots-1e-9&&totLots>0?'done':pricedLots>0?'active':'pending', date:'', tag:fmtN(pricedLots,0)+'/'+fmtN(totLots,0)+' lots'};
  st.alloc={state: allocated.length>=lines.length?'done':allocated.length>0?'active':'pending', date: shipments.length?fmtDate(shipments.map(s=>s.ETA).filter(Boolean).sort()[0]):'', tag:allocated.length+'/'+lines.length+' BLs'};
  st.customs={state:customsState,date:'',tag:customsTag};
  st.deliver={state:delState,date:delDate,tag:delTag};
  st.raised={state: arRaised?'done':'pending', date: arRaised?fmtDate(arRows.map(a=>a['DELIVERY DATE']).filter(Boolean).sort()[0]):'', tag: arRaised?arRows.length+' invoice'+(arRows.length>1?'s':''):'not raised'};
  st.received={state: arReceived?'done':arRaised?'active':'pending', date:'', tag: arReceived?'settled':arRaised?fmtM(arRows.filter(a=>(a.Status||'Open')!=='Paid').reduce((s,a)=>s+(a._total||0),0))+' open':'—'};
  return {stages:st,arRows,totLots,pricedLots,lines};
}
function contractLifecycle(sn){
  const lines=Store.d.contracts.map(deriveContract).filter(c=>c['S Number']===sn);
  if(!lines.length)return null;
  // group by delivery quota (month)
  const byQuota={};
  lines.forEach(l=>{const k=l.Quota?fmtMY(l.Quota):'Unscheduled';(byQuota[k]=byQuota[k]||[]).push(l);});
  const groups=Object.keys(byQuota).sort((a,b)=>{const pa=parseDate(byQuota[a][0].Quota)||0,pb=parseDate(byQuota[b][0].Quota)||0;return pa-pb;})
    .map(q=>({quota:q,...computeStages(byQuota[q])}));
  const overall=computeStages(lines);
  return {lines,groups,...overall};
}

/* ---------- G8. REPORTS ---------- */
const _r2=x=>(x==null||x===''||isNaN(x))?'':Math.round(x*100)/100;
const _r0=x=>(x==null||x===''||isNaN(x))?'':Math.round(x);
function statusText(c){return c._isAvg?'Averaging':c._status==='P'?'Priced':c._status==='PP'?'Part-priced':'Open';}
function buildPricingReport(){
  const rows=Store.d.contracts.map(deriveContract).sort((a,b)=>String(a['S Number']).localeCompare(String(b['S Number']))).map(c=>{
    const avgTon=c._isAvg?c._openTon:0, unpTon=c._isAvg?0:c._openTon;
    return {'S-Number':c['S Number'],'P-Number':c['P number']||'',Customer:c.Customer,Product:c.Product,'Diameter/Spec':c.Spec,
      Quota:fmtMY(c.Quota),QP:c.QP||'',Tonnage:num(c.Tonnage)||0,'Priced t':_r2(c._pricedTon),'Unpriced t':_r2(unpTon),
      'Averaging t':_r2(avgTon),'Final EUR/t':_r2(c._finalPrice),Status:statusText(c)};});
  return {sheet:'Priced-Unpriced-Averaging',rows};
}
function buildCreditReport(){
  const dir=customerDirectory();
  const rows=Object.values(dir).filter(e=>e.credit).sort((a,b)=>String(a.short).localeCompare(String(b.short))).map(e=>{
    const line=creditLine(e),ar=openAR(e),c=e.credit;
    return {'Short Name':e.short,'Full Company Name':c['Full Company Name']||'','VAT':c['VAT CODE']||'',Country:c.Column3||'',
      'Best Served From':c['Best Served From']||'','MT/Month':num(c['MT / MONTH'])??'',Payment:c.Payment||'',
      'Credit Line (EUR)':_r2(line),'Open AR (EUR)':_r2(ar),'Available Line (EUR)':_r2(line-ar),'Utilisation %':line?Math.round(ar/line*100):0};});
  return {sheet:'Credit Limits',rows};
}
function buildARReport(){
  const rows=Store.d.ar.map(deriveAR).sort((a,b)=>(parseDate(a['DUE DATE'])||0)-(parseDate(b['DUE DATE'])||0)).map(a=>{
    const perf=arPerformance(a);
    return {Customer:a.CUSTOMER,'Delivery Q':fmtMY(a['DELIVERY Q']),'Net t':num(a['NET TONNAGE'])??'','Price/t':num(a.PRICE)??'',
      'Amount (EUR)':_r2(a._total),'Payment Term':a['PAYMENT TERM']||'','Delivery Date':a['DELIVERY DATE']||'','Invoice No':a['INV No.']||'',
      'Due Date':a['DUE DATE']||'',Status:a.Status||'Open','Paid Date':a['PAID DATE']||'','Performance (+early/-late days)':perf.days==null?'':perf.days};});
  return {sheet:'Account Receivables',rows};
}
function buildContractsReport(){
  const rows=Store.d.contracts.map(deriveContract).sort((a,b)=>String(a['S Number']).localeCompare(String(b['S Number']))|| (parseDate(a.Quota)-parseDate(b.Quota))).map(c=>({
    'S-Number':c['S Number'],'P-Number':c['P number']||'',Customer:c.Customer,Product:c.Product,'Diameter/Spec':c.Spec,'Service Port':c['Service Port']||'',
    Quota:fmtMY(c.Quota),QP:c.QP||'',Tonnage:num(c.Tonnage)||0,Lots:_r0(c._lots),Premium:num(c.Premium)??'','Payment Terms':c['Payment Terms']||'',
    'BL Allocation':c['BL Allocation']||'','Release Status':c['Release Status']||'','Customs Status':c['Customs Status']||'',
    'Delivery Date':c._delivery||'','Receivable Date':c._receivable||'','Final EUR/t':_r2(c._finalPrice),Status:statusText(c)}));

function buildShipmentsReport(){
  const rows=Store.d.shipments.map(deriveShipment).sort((a,b)=>(parseDate(a.ETA)||0)-(parseDate(b.ETA)||0)).map(s=>({
    'BL Number':s['BL NUMBER'],'Steinweg Ref':s['STWG REF']||'',Port:s['PORT OF DELIVERY']||'',Purchase:s['PURCHASE NUMBER']||'',
    Quota:fmtMY(s['QUOTA MONTH']),'Delivery Month':fmtMY(s['DELIVERY MONTH']),'Diameter/Spec':s.DIAMETER||'',Product:s._product,
    'SOB Date':s['SOB DATE']||'',ETA:s.ETA||'',Tracking:s._track.label,'Net Weight':num(s['NET WEIGHT'])??'',Containers:_r0(s._containers),
    'Price/t':num(s['PRICE MT'])??'','Duty (EUR)':_r2(s._duty),'STWG (EUR)':_r2(s._stwg),'Invoice (EUR)':_r2(s._invoice),

const REPORTS=[
  {key:'pricing',  title:'Priced / Unpriced / Averaging', desc:'Every contract line with priced, unpriced and averaging tonnage, weighted final price and status.', icon:'tag',      build:buildPricingReport},
  {key:'credit',   title:'Credit Limits',                 desc:'Approved credit line, open receivables, available line and utilisation for each insured customer.', icon:'credit', build:buildCreditReport},
  {key:'ar',       title:'Account Receivables',           desc:'Full receivables ledger with amounts, due dates, paid dates and payment performance.', icon:'receipt', build:buildARReport},
  {key:'contracts',title:'Sales Contracts',               desc:'All contract lines with quota, QP, tonnage, terms, BL allocation, progress and pricing.', icon:'contract', build:buildContractsReport},
  {key:'shipments',title:'Shipments / BLs',               desc:'Every BL with Steinweg ref, tracking, cost breakdown, invoice status and financier.', icon:'ship',   build:buildShipmentsReport},
  {key:'custom',   title:'Custom report',                 desc:'Pick any fields from the pipeline dataset, arrange the columns yourself and generate a bespoke report.', icon:'grid', custom:true}
];
async function exportReport(key){
  if(!Auth.can('export')){toast('You do not have export permission','amber');return;}
  const rep=REPORTS.find(r=>r.key===key);const {sheet,rows}=rep.build();
  if(!rows.length){toast('No data for this report','amber');return;}
  try{await ensureXLSX();}catch(e){toast('Could not load the export engine (needs an internet connection)','amber');return;}
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=Object.keys(rows[0]).map(k=>({wch:Math.min(42,Math.max(k.length+2,...rows.map(r=>String(r[k]??'').length+2)))}));
  ws['!autofilter']={ref:XLSX.utils.encode_range({s:{c:0,r:0},e:{c:Object.keys(rows[0]).length-1,r:rows.length}})};

const blKey=x=>String(x||'').trim().toUpperCase();
function specLabel(d){const s=String(d||'');if(/wire\s*rod/i.test(s))return'Wire Rod';const m=s.match(/(\d+)\s*"/)||s.match(/(\d+)\s*inch/i);return m?m[1]+' Inch':(s||'—');}
function monthShort(v){const d=parseDate(v);return d?d.toLocaleString('en-GB',{month:'short'}).toUpperCase():'';}
function titlePort(p){p=String(p||'');return p?p.charAt(0)+p.slice(1).toLowerCase():'';}
function projectionModel(){
  const ships=Store.d.shipments.map(deriveShipment);
  const contracts=Store.d.contracts.map(deriveContract);
  const map={};
  ships.forEach(s=>{map[blKey(s['BL NUMBER'])]={s,allocs:[]};});
  contracts.forEach(c=>{const k=blKey(c['BL Allocation']);if(k&&map[k])map[k].allocs.push(c);});

}

        if(!bls.length){body+=`<td class="pq-cell empty"></td>`;return;}
        const arrival=bls.reduce((x,s)=>x+(num(s['NET WEIGHT'])||0),0);
        const allocs=[];bls.forEach(s=>{(allocBL[blKey(s['BL NUMBER'])]||[]).forEach(c=>allocs.push(c));});
        allocs.sort((a,b)=>(parseDate(a.Quota)||0)-(parseDate(b.Quota)||0));
        const rem=arrival-allocs.reduce((x,c)=>x+(num(c.Tonnage)||0),0);
        let inner=`<div class="pq-arr">ARRIVAL ${fmtN(arrival)}</div>`;
        allocs.forEach(c=>{inner+=`<div class="pq-alloc" data-alloc="${c.id}" title="${esc(c['S Number']||'')} · click to edit"><span>${monthShort(c.Quota)} · ${esc(custShort(c.Customer))}</span><b>-${fmtN(c.Tonnage)}</b></div>`;});
        inner+=`<div class="pq-rem ${rem>0.01?'pos':rem<-0.01?'neg':''}">REMAINING ${fmtN(rem)}</div>`;
        if(canEdit)inner+=`<button class="pq-add" data-add="${esc(port)}~~${esc(spec)}~~${esc(p.p)}">+ allocate</button>`;
        body+=`<td class="pq-cell">${inner}</td>`;
      });
      body+=`</tr>`;
    });
  });
  body+=`</tbody>`;tbl.innerHTML=head+body;wrap.querySelector('.tbl-wrap').append(tbl);v.append(wrap);
  wrap.querySelectorAll('[data-alloc]').forEach(x=>x.onclick=()=>editAllocation(x.dataset.alloc));
  wrap.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{const[port,spec,p]=b.dataset.add.split('~~');addAllocation(port,spec,p);});
};

/* ----- Tonnage calculator ----- */
function openCalculator(preKey){
  const dir=customerDirectory();
  const custs=Object.values(dir).filter(e=>e.credit).sort((a,b)=>String(a.short).localeCompare(String(b.short)));
  if(!custs.length){toast('No customers with a credit line yet','amber');return;}
  const terms=Store.d.calcTerms;
  const defOv=(()=>{const e=dir[preKey];const q=e?num(e.credit?.['Quota Overlap']):null;return q&&q>0?Math.min(6,Math.round(q)):1;})();
  openModal(`
    <div class="modal-h">${svg('calc',19)}<h3>Sellable tonnage calculator</h3><button class="x" onclick="closeModal()">${svg('close',18)}</button></div>
    <div class="modal-b">
      <div class="form-grid">
        <div class="fg full"><label>Customer</label><select class="inp" id="calcCust" style="width:100%">${custs.map(e=>`<option value="${esc(e.key)}" ${preKey===e.key?'selected':''}>${esc(e.short)} — ${esc(e.display)}</option>`).join('')}</select></div>
        <div class="fg"><label>LME price (€/t)</label><input class="inp" id="calcLme" type="number" step="0.01" placeholder="e.g. 2350"></div>
        <div class="fg"><label>Premium (€/t)</label><input class="inp" id="calcPrem" type="number" step="0.01" placeholder="e.g. 1100"></div>
        <div class="fg"><label>FX divisor <span class="t-sub" style="font-weight:400">(optional)</span></label><input class="inp" id="calcFx" type="number" step="0.0001" placeholder="1.00"></div>
        <div class="fg"><label>Deliveries offered / overlap</label><select class="inp" id="calcOv">${[1,2,3,4,5,6].map(n=>`<option value="${n}" ${n===defOv?'selected':''}>${n} concurrent ${n===1?'delivery':'deliveries'}</option>`).join('')}</select></div>
        <div class="fg"><label>Payment term</label><select class="inp" id="calcTerm"><option value="all">Compare all terms</option>${terms.map((t,i)=>`<option value="${i}">${esc(t.term)}</option>`).join('')}</select></div>
      </div>
      <div id="calcLineBox" style="margin-top:16px"></div>
      <div id="calcOut" style="margin-top:14px"></div>
      <div class="callout grey" style="margin-top:14px">${svg('alert',16)}<div>Final price = LME + premium (÷ FX if given). The <b>whole-line</b> capacity is available line ÷ final price. Because a receivable stays open for the payment term, running monthly deliveries means several invoices are outstanding at once — so the <b>per-month</b> tonnage is the line spread across the overlap: available line ÷ (overlap × price). Longer terms carry a larger natural overlap and lower the monthly tonnage; raising “deliveries offered” lowers it further.</div></div>
    </div>
    <div class="modal-f"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>`,{wide:true});
  const lineBox=$('#calcLineBox'),out=$('#calcOut');
  const recompute=()=>{
    const e=dir[$('#calcCust').value];if(!e)return;const line=creditLine(e),ar=openAR(e),avail=line-ar;
    const chosenOv=+($('#calcOv').value||1);
    const u=line?ar/line*100:0,col=avail<0?'var(--amber)':u>85?'var(--amber)':'var(--green)';
    lineBox.innerHTML=`<div class="card" style="box-shadow:none"><div class="card-b" style="padding:13px 15px"><div class="metric-row">
      <div class="metric"><div class="m-l">Credit line</div><div class="m-v">${fmtM(line)}</div></div>
      <div class="metric"><div class="m-l">Open AR</div><div class="m-v" style="color:${ar?'var(--amber)':'inherit'}">${fmtM(ar)}</div></div>
      <div class="metric"><div class="m-l">Available line</div><div class="m-v" style="color:${col}">${fmtM(avail)}</div></div>
      <div class="metric"><div class="m-l">Overlap chosen</div><div class="m-v">${chosenOv}×</div></div>
    </div></div></div>`;
    const lme=$('#calcLme').value,prem=$('#calcPrem').value,fx=$('#calcFx').value;
    if((!lme&&!prem)){out.innerHTML=`<div class="empty" style="padding:26px">${svg('euro',30)}<div style="margin-top:8px">Enter LME and premium to see deliverable tonnage.</div></div>`;return;}
    const r=tonnageFor(avail,lme,prem,fx);
    if(!r){out.innerHTML=`<div class="callout amber">${svg('alert',16)}<div>Final price must be greater than zero.</div></div>`;return;}
    const estDelivery=addDays(today(),Store.d.config.etaToRelease+Store.d.config.releaseToDelivery);
    const sel=$('#calcTerm').value;
    const rows=terms.map((t,i)=>{const due=calcDueDate(iso(estDelivery),t);const exp=Math.max(0,(daysBetween(today(),due)||0)-10);const natOv=Math.max(1,Math.ceil(exp/30)-1);const ov=chosenOv;return {t,i,due,exp,natOv,ov};});
    const shown=sel==='all'?rows:rows.filter(r2=>String(r2.i)===sel);
    const priceLine=`<div style="display:flex;align-items:center;gap:22px;margin-bottom:12px;flex-wrap:wrap">
        <div class="metric"><div class="m-l">Final price</div><div class="m-v mono">${fmtEur2(r.finalPrice)}<span style="font-size:12px;color:var(--muted)">/t</span></div></div>
        <div class="metric"><div class="m-l">Whole-line tonnage</div><div class="m-v mono" style="color:var(--brand)">${avail>0?fmtN(r.tonnage,1):'0.0'} t</div></div>
        <div class="metric"><div class="m-l">Whole-line lots</div><div class="m-v mono">${avail>0?fmtN(r.lots,0):'0'}</div></div>
        <div class="metric"><div class="m-l">Est. delivery</div><div class="m-v mono" style="font-size:14px">${fmtDate(estDelivery)}</div></div>
      </div>`;
    out.innerHTML=`${avail<0?`<div class="callout amber" style="margin-bottom:10px">${svg('alert',16)}<div>This customer is over their credit line by ${fmtM(-avail)} — no headroom to sell.</div></div>`:''}
      ${priceLine}
      <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Payment term</th><th class="num">Exposure days</th><th class="num">Natural overlap</th><th class="num">Overlap used</th><th class="num">Tonnage / month</th><th class="num">Lots / mo</th><th>Est. receivable due</th></tr></thead><tbody>
      ${shown.map(({t,due,exp,natOv,ov})=>{const perMonth=avail>0?r.tonnage/ov:0;return `<tr><td class="t-strong">${esc(t.term)}</td><td class="num">${exp!=null?exp:'—'}</td><td class="num">${natOv}×</td><td class="num" style="font-weight:650">${ov}×</td><td class="num" style="color:var(--brand);font-weight:650">${fmtN(perMonth,1)}</td><td class="num">${fmtN(perMonth/25,0)}</td><td class="mono">${fmtDate(due)}</td></tr>`;}).join('')}
      </tbody></table></div>`;
  };
  ['calcCust','calcLme','calcPrem','calcFx','calcTerm','calcOv'].forEach(id=>{const n=$('#'+id);n.addEventListener('input',recompute);n.addEventListener('change',recompute);});
  recompute();
  audit('calculator opened');
}

let _tess=null;
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('load failed '+src));document.head.append(s);});}
async function ensureTesseract(){if(window.Tesseract)return;await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');}

function parseBLText(txt){
  const T=txt.replace(/\r/g,'');const up=T.toUpperCase();
  const find=re=>{const m=up.match(re);return m?m[1].trim():'';};
  const bl=find(/B\/?L\s*(?:NO\.?|NUMBER)?\s*[:#]?\s*([A-Z]{3,4}\s?[A-Z0-9]{6,})/)||find(/BILL OF LADING\s*(?:NO\.?)?\s*[:#]?\s*([A-Z0-9]{6,})/);
  let port='';for(const p of PORTS){if(up.includes(p)){port=p;break;}}
  const net=find(/NET\s*(?:WEIGHT|WT)?\s*[:#]?\s*([\d.,]{3,})/);
  const gross=find(/GROSS\s*(?:WEIGHT|WT)?\s*[:#]?\s*([\d.,]{3,})/);
  const cont=find(/(\d{1,3})\s*(?:X\s*)?(?:CONTAINER|CNTR|FCL|20'|40')/);
  const eta=find(/(?:ETA|ARRIVAL)\s*[:#]?\s*(\d{1,2}[\/.\-]\d{1,2}[\/.\-]\d{2,4})/);
  const sob=find(/(?:SHIPPED ON BOARD|SOB|LADEN)\s*[:#]?\s*(\d{1,2}[\/.\-]\d{1,2}[\/.\-]\d{2,4})/);
  const clean=s=>s.replace(/[.,](?=\d{3}\b)/g,'').replace(',','.');
  return {bl,port,net:net?clean(net):'',gross:gross?clean(gross):'',cont,eta,sob};
}
function openOCR(){
  if(!requirePerm('edit_shipment','scan BL documents'))return;
  openModal(`<div class="modal-h">${svg('scan',19)}<h3>Scan Bill of Lading</h3><button class="x" onclick="closeModal()">${svg('close',18)}</button></div>
    <div class="modal-b">
      <div class="dropzone" id="ocrDrop"><input type="file" id="ocrFile" accept="image/*,application/pdf" class="hide">
        ${svg('upload',30)}<div style="margin-top:8px;font-weight:600">Drop a BL image here or click to browse</div>
        <div class="hint" style="margin-top:4px">JPG or PNG scans work best. Fields are extracted for review — nothing is saved until you confirm.</div></div>
      <div id="ocrProg" class="hide" style="margin-top:14px"></div>
      <div id="ocrResult" class="hide" style="margin-top:16px"></div>
    </div>
    <div class="modal-f"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary hide" id="ocrUse">${svg('check',15)}<span>Use these fields</span></button></div>`,{wide:true});
  const drop=$('#ocrDrop'),file=$('#ocrFile'),prog=$('#ocrProg'),result=$('#ocrResult');
  drop.onclick=()=>file.click();
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag');};
  drop.ondragleave=()=>drop.classList.remove('drag');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])run(e.dataTransfer.files[0]);};
  file.onchange=()=>{if(file.files[0])run(file.files[0]);};
  let parsed=null;
  async function run(f){
    if(f.type==='application/pdf'){toast('Please upload an image of the BL (PDF OCR not supported in-browser)','amber');return;}
    prog.classList.remove('hide');prog.innerHTML=`<div class="callout grey">${svg('scan',16)}<div>Loading OCR engine…</div></div>`;
    try{
      await ensureTesseract();
      prog.innerHTML=`<div class="callout grey">${svg('scan',16)}<div><div>Reading document…</div><div class="progbar" style="margin-top:8px"><div id="ocrBar" style="width:0%"></div></div></div></div>`;
      const url=URL.createObjectURL(f);
      const {data}=await Tesseract.recognize(url,'eng',{logger:m=>{if(m.status==='recognizing text'){const b=$('#ocrBar');if(b)b.style.width=Math.round(m.progress*100)+'%';}}});
      parsed=parseBLText(data.text);
      prog.classList.add('hide');
      result.classList.remove('hide');
      result.innerHTML=`<div class="hint" style="font-weight:600;color:var(--ink-2);margin-bottom:8px">Review extracted fields</div>
        <div class="form-grid">
          ${fld('BL number','o_bl',parsed.bl)}${seln('Port','o_port',parsed.port,PORTS)}
          ${fld('Net weight (t)','o_net',parsed.net,'number')}${fld('Containers','o_cont',parsed.cont,'number')}
          ${fld('ETA','o_eta',parsed.eta)}${fld('SOB date','o_sob',parsed.sob)}
        </div>
        <details style="margin-top:10px"><summary class="hint" style="cursor:pointer">Raw OCR text</summary><pre style="max-height:130px;overflow:auto;font-size:11px;background:#0d1117;color:#c9d1d9;padding:10px;border-radius:8px;margin-top:6px;white-space:pre-wrap">${esc(data.text.slice(0,1500))}</pre></details>`;
      $('#ocrUse').classList.remove('hide');
      $('#ocrUse').onclick=()=>{closeModal();editShipment(null);setTimeout(()=>{const set=(id,v)=>{const n=$('#'+id);if(n&&v)n.value=v;};set('f_bl',gv('o_bl'));set('f_port',gv('o_port'));set('f_net',gv('o_net'));const eta=gv('o_eta');if(eta){const d=parseDate(eta);if(d)$('#f_eta').value=iso(d);}const sob=gv('o_sob');if(sob){const d=parseDate(sob);if(d)$('#f_sob').value=iso(d);}const ev=new Event('input');['f_port','f_net'].forEach(i=>$('#'+i)?.dispatchEvent(ev));toast('Fields imported — review and save','green');},120);};
      audit('BL scanned',parsed.bl||'(unread)');
    }catch(err){prog.innerHTML=`<div class="callout amber">${svg('alert',16)}<div>Could not run OCR: ${esc(err.message)}. Check your connection (the engine loads from a CDN) or enter the shipment manually.</div></div>`;}
  }
}

/* ----- Excel export/import (SheetJS) ----- */
async function exportSheet(type){
  if(!Auth.can('export')){toast('No export permission','amber');return;}
  try{await ensureXLSX();}catch(e){toast('Could not load export engine (needs connection)','amber');return;}
  const wb=XLSX.utils.book_new();
  const add=(name,rows)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),name);
  const strip=o=>{const {id,...r}=o;return r;};
  if(type==='shipments'||type==='all')add('Shipments',Store.d.shipments.map(deriveShipment).map(strip));
  if(type==='contracts'||type==='all')add('Contracts',Store.d.contracts.map(deriveContract).map(strip));
  if(type==='credit'||type==='all')add('Credit',Store.d.credit.map(strip));
  if(type==='ar'||type==='all')add('Receivables',Store.d.ar.map(deriveAR).map(strip));
  XLSX.writeFile(wb,'krg-'+type+'-'+iso(new Date())+'.xlsx');
  audit('exported '+type);toast('Exported to Excel','green');
}

/* ========== FINANCE VIEWS & IMPORT ========== */
/* ============================================================
   FINANCE MODULE — Accounts · Controller · Trade Finance
   All views derive from existing data; missing inputs render as
   empty cells and a prompt to upload via Backup & Recovery.
   New data lives only in Store.d.finance.* (additive, isolated).
   ============================================================ */
const FIN=()=>Store.d.finance||{bankTx:[],payables:[],vatEntries:[],facilities:[],fxMarks:[]};
const EM='<span class="t-sub">—</span>';
function finEmpty(host,title,sub){host.innerHTML=emptyBox('upload',title,sub||'Populate it from Backup & Recovery → Finance data import.');}
function bucketAge(due){const d=daysBetween(today(),parseDate(due));if(d==null)return'—';if(d>=0)return'Current';const a=-d;if(a<=30)return'1–30';if(a<=60)return'31–60';if(a<=90)return'61–90';return'90+';}
function finKpiRow(items){return `<div class="card" style="margin-bottom:16px"><div class="card-b"><div class="metric-row">${items.map(i=>`<div class="metric"><div class="m-l">${esc(i[0])}</div><div class="m-v"${i[2]?` style="color:${i[2]}"`:''}>${i[1]}</div></div>`).join('')}</div></div></div>`;}
function finCard(title,hint,bodyHtml,headExtra){return `<div class="card" style="margin-bottom:16px"><div class="card-h"><h3>${esc(title)}</h3>${hint?`<div class="hint">${esc(hint)}</div>`:''}${headExtra?`<div class="sp"></div>${headExtra}`:''}</div><div class="card-b flush"><div class="tbl-wrap">${bodyHtml}</div></div></div>`;}
function finTable(cols,rows,foot){
  if(!rows.length)return emptyBox('grid','Nothing to show yet','No matching records for this view.');
  const th=cols.map(c=>`<th class="${c.num?'num':''}">${esc(c.h)}</th>`).join('');
  const bd=rows.map(r=>`<tr>${cols.map(c=>`<td class="${c.num?'num':''} ${c.mono?'mono':''} ${c.strong?'t-strong':''}">${r[c.k]==null||r[c.k]===''?EM:r[c.k]}</td>`).join('')}</tr>`).join('');
  const ft=foot?`<tr class="t-strong" style="border-top:2px solid var(--border-2)">${cols.map(c=>`<td class="${c.num?'num':''} ${c.mono?'mono':''}">${foot[c.k]!=null?foot[c.k]:''}</td>`).join('')}</tr>`:'';
  return `<table class="tbl"><thead><tr>${th}</tr></thead><tbody>${bd}${ft}</tbody></table>`;
}

/* Invoice register: provisional (from contract lifecycle) + final (from AR) */
function invoiceRegister(){
  const out=[];
  Store.d.contracts.map(deriveContract).forEach(c=>{ if(c['Prov Inv No']||c['Prov Inv Amount']!=null){
    out.push({type:'Provisional',no:c['Prov Inv No']||'—',customer:c.Customer,contract:c['S Number'],q:c.Quota,amount:num(c['Prov Inv Amount']),issue:null,due:null,status:'Record only',bl:c['BL Allocation']||''});}});
  Store.d.ar.map(deriveAR).forEach(a=>{ if(a['INV No.']||a._total!=null){
    out.push({type:'Final',no:a['INV No.']||'—',customer:a.CUSTOMER,contract:a['Inv Contract']||'',q:a['DELIVERY Q'],amount:num(a['TOTAL AMOUNT'])??a._total,issue:a['Inv Date']||a['DELIVERY DATE'],due:a['DUE DATE'],status:(a.Status||'Open'),bl:''});}});
  return out;
}

RENDER.controls=function(v){
  if(Auth.can('export'))topBtn('Export','download','export',()=>exportSheet('all'));
  const ex=[];
  // 1. BL net vs sum of container nets
  Store.d.shipments.forEach(s=>{const cs=Array.isArray(s.containers)?s.containers:[];if(cs.length){const sum=cs.reduce((a,c)=>a+(num(c.net)||0),0);const decl=num(s['NET WEIGHT']);if(decl!=null&&Math.abs(sum-decl)>0.5)ex.push(['Weight mismatch','warn',s['BL NUMBER'],'Container net '+fmtN(sum,3)+'t vs BL net '+fmtN(decl,3)+'t']);}});
  // 2. BL allocated but no PBs recorded (contract level)
  Store.d.contracts.map(deriveContract).forEach(c=>{const bl=c['BL Allocation'];if(bl&&!/^tbc$/i.test(bl)){const sh=shipmentByBL(bl);const pbs=sh&&Array.isArray(sh.containers)?sh.containers.filter(x=>String(x.pb||'').trim()).length:0;if(!pbs)ex.push(['No PB numbers','info',c['S Number'],'BL '+bl+' allocated but no container PBs recorded']);}});
  // 3. Provisional vs final delta
  const arByCustQ={};Store.d.ar.map(deriveAR).forEach(a=>{arByCustQ[custKey(a.CUSTOMER)+'|'+fmtMY(a['DELIVERY Q'])]=a;});
  Store.d.contracts.map(deriveContract).forEach(c=>{if(c['Prov Inv Amount']!=null){const a=arByCustQ[custKey(c.Customer)+'|'+fmtMY(c.Quota)];if(a&&a._total!=null){const d=Math.abs(a._total-num(c['Prov Inv Amount']));if(d>Math.max(1,0.02*a._total))ex.push(['Provisional vs final gap','warn',c['S Number'],'Provisional '+fmtM(num(c['Prov Inv Amount']))+' vs final '+fmtM(a._total)]);}}});
  // 4. Customer open AR over credit line
  const dir=customerDirectory();Object.values(dir).forEach(e=>{const line=creditLine(e),arv=openAR(e);if(line>0&&arv>line)ex.push(['Over credit line','warn',e.short,'Open AR '+fmtM(arv)+' exceeds line '+fmtM(line)]);});
  // 5. Unpriced tonnage past delivery date
  Store.d.contracts.map(deriveContract).forEach(c=>{const d=parseDate(c._delivery);if(d&&d<today()&&c._openTon>0.01&&!c._isAvg)ex.push(['Unpriced past delivery','warn',c['S Number'],fmtN(c._openTon,1)+'t still open, delivered '+fmtDate(c._delivery)]);});
  const sev=t=>t==='warn'?'<span class="chip amber">Review</span>':'<span class="chip grey">Info</span>';
  v.insertAdjacentHTML('beforeend',finKpiRow([
    ['Exceptions flagged',ex.length,ex.length?'var(--amber)':'var(--green)'],
    ['Needs review',ex.filter(e=>e[1]==='warn').length],
    ['Informational',ex.filter(e=>e[1]==='info').length],
    ['Checks run',5]
  ]));
  const cols=[{h:'Check',k:'chk',strong:1},{h:'Severity',k:'sev'},{h:'Reference',k:'ref',mono:1},{h:'Detail',k:'det'}];
  const rows=ex.map(e=>({chk:esc(e[0]),sev:sev(e[1]),ref:esc(e[2]||''),det:esc(e[3]||'')}));
  v.insertAdjacentHTML('beforeend',finCard('Exceptions & controls',ex.length?'items worth a second look before close':'all clear',rows.length?finTable(cols,rows):emptyBox('check','No exceptions','Every control passed on the current data.')));
};
